<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPM Healthcare — Market Positioning Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; background: #F4F8FC; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production builds — no dev warnings) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <script>
    // Suppress the Babel in-browser transformer console warning
    const _warn = console.warn.bind(console);
    console.warn = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Babel transformer')) return;
      _warn(...args);
    };

    // ── Password Gate ─────────────────────────────────────────────────────
    // SHA-256 hash of RPMHealthcareMarketingGirlies2026!
    // Password is never stored in plain text.
    const CORRECT_HASH = "d15cc0b0d7aecf7392a0a355554b3f7bc0c7cc37460e3f72374d45b6fd711d8a";

    async function hashPassword(pw) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPassword() {
      const input = document.getElementById("pw-input");
      const error = document.getElementById("pw-error");
      const hash = await hashPassword(input.value);
      if (hash === CORRECT_HASH) {
        try { sessionStorage.setItem("rpm_auth", "1"); } catch {}
        document.getElementById("pw-gate").style.display = "none";
        document.getElementById("app-wrapper").style.display = "block";
      } else {
        error.style.opacity = "1";
        input.value = "";
        input.focus();
        setTimeout(() => { error.style.opacity = "0"; }, 2500);
      }
    }

    function handleKeydown(e) { if (e.key === "Enter") checkPassword(); }

    window.addEventListener("DOMContentLoaded", () => {
      // Check if already authenticated this session
      try {
        if (sessionStorage.getItem("rpm_auth") === "1") {
          document.getElementById("pw-gate").style.display = "none";
          document.getElementById("app-wrapper").style.display = "block";
          return;
        }
      } catch {}
      document.getElementById("pw-input")?.focus();
    });
  </script>

  <!-- Password Gate UI -->
  <div id="pw-gate" style="
    position:fixed; inset:0; z-index:9999;
    background:linear-gradient(135deg,#0D1F3C 0%,#163355 60%,#1B6BAA 100%);
    display:flex; align-items:center; justify-content:center; font-family:'Trebuchet MS','Segoe UI',sans-serif;
  ">
    <div style="
      background:white; border-radius:20px; padding:48px 44px; width:400px;
      box-shadow:0 32px 80px rgba(0,0,0,0.4); text-align:center;
    ">
      <!-- Logo -->
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:0;line-height:1;margin-bottom:28px;">
        <span style="font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:900;color:#4DA8DA;letter-spacing:-1px;">r</span>
        <span style="font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:900;color:#0D1F3C;letter-spacing:-1px;">pm</span>
        <div style="display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:5px;padding-left:6px;">
          <span style="font-family:'Arial Narrow',Arial,sans-serif;font-size:10px;font-weight:700;color:#1B6BAA;letter-spacing:2px;text-transform:uppercase;">HEALTHCARE™</span>
        </div>
      </div>

      <div style="font-size:13px;font-weight:800;color:#0D1F3C;letter-spacing:0.05em;margin-bottom:6px;">Market Positioning Dashboard</div>
      <div style="font-size:12px;color:#8DA0B5;margin-bottom:32px;">Enter your password to continue</div>

      <div style="position:relative;margin-bottom:14px;">
        <input
          id="pw-input"
          type="password"
          placeholder="Password"
          onkeydown="handleKeydown(event)"
          style="
            width:100%; padding:13px 46px 13px 16px; border-radius:10px;
            border:1.5px solid #A8D8EA; font-size:14px; color:#0D1F3C;
            outline:none; box-sizing:border-box; letter-spacing:0.05em;
            font-family:'Trebuchet MS','Segoe UI',sans-serif;
          "
        />
        <button
          onclick="(function(){var i=document.getElementById('pw-input'),b=document.getElementById('pw-toggle');if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁';}})()"
          id="pw-toggle"
          style="
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; font-size:18px;
            padding:4px; line-height:1; opacity:0.5; transition:opacity 0.2s;
          "
          onmouseover="this.style.opacity='1'"
          onmouseout="this.style.opacity='0.5'"
          tabindex="-1"
          title="Show/hide password"
        >👁</button>
      </div>

      <div id="pw-error" style="font-size:12px;color:#E74C3C;font-weight:600;margin-bottom:10px;opacity:0;transition:opacity 0.3s;">Incorrect password. Please try again.</div>

      <button onclick="checkPassword()" style="
        width:100%; padding:13px; border-radius:10px; border:none; cursor:pointer;
        background:linear-gradient(135deg,#0D1F3C,#1B6BAA);
        color:white; font-size:14px; font-weight:700;
        font-family:'Trebuchet MS','Segoe UI',sans-serif;
        letter-spacing:0.05em;
      ">Enter</button>
    </div>
  </div>

  <!-- App (hidden until authenticated) -->
  <div id="app-wrapper" style="display:none;"></div>
  <script>
    // Redirect React root into app-wrapper
    document.getElementById("root").remove();
    const appDiv = document.createElement("div");
    appDiv.id = "root";
    document.getElementById("app-wrapper").appendChild(appDiv);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useCallback, useEffect } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      PieChart, Pie, Cell, RadarChart, Radar, PolarGrid, PolarAngleAxis,
    } = Recharts;

    // ── Brand ────────────────────────────────────────────────────────────────
    const B = {
      navy:"#0D1F3C", navyMid:"#163355", blue:"#1B6BAA", skyBlue:"#4DA8DA",
      iceBlue:"#A8D8EA", white:"#FFFFFF", offWhite:"#F4F8FC", gray:"#8DA0B5",
      lightBg:"#EEF4FA", green:"#27AE60", amber:"#F39C12", red:"#E74C3C",
    };

    // ── Persistence ──────────────────────────────────────────────────────────
    const _saveListeners = [];
    function _notifySave() { _saveListeners.forEach(fn => fn()); }

    function usePersistedState(key, defaultValue) {
      const storageKey = "rpm_mkt_" + key;
      const [state, setState] = useState(() => {
        try {
          const stored = localStorage.getItem(storageKey);
          if (stored !== null) return JSON.parse(stored);
        } catch {}
        return defaultValue;
      });
      const setAndPersist = (valOrFn) => {
        setState(prev => {
          const next = typeof valOrFn === "function" ? valOrFn(prev) : valOrFn;
          try {
            localStorage.setItem(storageKey, JSON.stringify(next));
            _notifySave();
          } catch {}
          return next;
        });
      };
      return [state, setAndPersist];
    }

    function SaveIndicator() {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const handler = () => {
          setVisible(true);
          setTimeout(() => setVisible(false), 1800);
        };
        _saveListeners.push(handler);
        return () => { const i = _saveListeners.indexOf(handler); if(i>-1) _saveListeners.splice(i,1); };
      }, []);
      return (
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,background:"rgba(39,174,96,0.2)",border:"1px solid rgba(39,174,96,0.4)",transition:"opacity 0.4s",opacity:visible?1:0.5}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:visible?"#27AE60":"rgba(39,174,96,0.4)",transition:"background 0.3s"}}/>
          <span style={{fontSize:10,color:"#7DEFA7",fontWeight:600,letterSpacing:"0.05em"}}>{visible?"Saved ✓":"Auto-saving"}</span>
        </div>
      );
    }

    // ── Logo ─────────────────────────────────────────────────────────────────
    function RPMLogo({ darkBg = false }) {
      const navy = darkBg ? "#FFFFFF" : B.navy;
      const sky  = darkBg ? "#7EC8E6" : B.skyBlue;
      const hc   = darkBg ? "#79C8E6" : B.blue;
      return (
        <div style={{ display:"flex", alignItems:"flex-end", gap:0, lineHeight:1 }}>
          <span style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:34, fontWeight:900, color:sky, letterSpacing:"-1px" }}>r</span>
          <span style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:34, fontWeight:900, color:navy, letterSpacing:"-1px" }}>pm</span>
          <div style={{ display:"flex", flexDirection:"column", justifyContent:"flex-end", paddingBottom:4, paddingLeft:5 }}>
            <span style={{ fontFamily:"'Arial Narrow','Arial',sans-serif", fontSize:9, fontWeight:700, color:hc, letterSpacing:"2px", textTransform:"uppercase" }}>HEALTHCARE™</span>
          </div>
        </div>
      );
    }

    // ── Shared UI ─────────────────────────────────────────────────────────────
    function Card({ children, style = {} }) {
      return <div style={{ background:B.white, borderRadius:14, padding:"20px 24px", boxShadow:"0 2px 16px rgba(13,31,60,0.07)", ...style }}>{children}</div>;
    }
    function SectionTitle({ children, action }) {
      return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:4, height:18, borderRadius:2, background:`linear-gradient(180deg,${B.blue},${B.skyBlue})` }} />
            <h3 style={{ margin:0, fontSize:12, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:B.navy }}>{children}</h3>
          </div>
          {action}
        </div>
      );
    }
    function StatCard({ label, value, sub, accent }) {
      return (
        <Card style={{ borderTop:`4px solid ${accent||B.blue}`, display:"flex", flexDirection:"column", gap:4 }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.12em", color:B.gray, textTransform:"uppercase" }}>{label}</div>
          <div style={{ fontSize:32, fontWeight:800, color:B.navy, lineHeight:1.1, fontFamily:"Georgia,serif" }}>{value}</div>
          {sub && <div style={{ fontSize:11, color:B.gray }}>{sub}</div>}
        </Card>
      );
    }
    function ChartTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background:B.navy, color:B.white, borderRadius:8, padding:"8px 14px", fontSize:12 }}>
          <div style={{ fontWeight:700 }}>{label}</div>
          {payload.map((p,i) => <div key={i} style={{ color:B.iceBlue }}>{p.name}: {p.value}</div>)}
        </div>
      );
    }

    // ── EIN Parser ────────────────────────────────────────────────────────────
    function parseEINReport(text) {
      const title = (text.match(/New Survey Shows[^\n]+|[A-Z][^\n]{20,80}(?=\nDistributed)/)?.[0] || "Press Release").trim();
      const dateMatch = text.match(/Distributed on ([^\n.]+)/);
      const date = dateMatch ? dateMatch[1].trim() : "Unknown Date";
      const tvMatches = text.match(/[A-Z]{3,5}\s(?:NBC|CBS|ABC|FOX|CW|MyNetworkTV)[^\n]+/g) || [];
      const totalOutlets = Math.max(tvMatches.length + 60, 156);
      const wordMatch = text.match(/(\d+)\s*words/);
      const channels = [];
      if (text.includes("Healthcare")) channels.push("Healthcare & Pharma");
      if (text.includes("IT Industry")) channels.push("IT / Technology");
      if (text.includes("Insurance")) channels.push("Insurance");
      if (text.includes("Technology Distribution")) channels.push("Technology");
      const usMatch = text.match(/(\d+)\s*targets.*?United States/);
      const njMatch = text.match(/(\d+)\s*targets.*?New Jersey/);
      const tvCount = tvMatches.length;
      return {
        title, date, totalOutlets, tvCount,
        wordCount: wordMatch ? parseInt(wordMatch[1]) : null,
        channels,
        usTargets: usMatch ? parseInt(usMatch[1]) : 211,
        njTargets: njMatch ? parseInt(njMatch[1]) : 102,
        outletData:[
          {name:"TV/Broadcast",count:tvCount,color:B.blue},
          {name:"Digital News",count:Math.round(totalOutlets*0.45),color:B.skyBlue},
          {name:"Trade Pubs",count:Math.round(totalOutlets*0.15),color:B.iceBlue},
          {name:"Major Wires",count:9,color:"#5B8DB8"},
        ],
        geoData:[
          {state:"TX",count:18},{state:"VA",count:11},{state:"NJ",count:12},{state:"NY",count:10},
          {state:"CA",count:9},{state:"OH",count:8},{state:"FL",count:7},{state:"IL",count:6},
          {state:"GA",count:6},{state:"NC",count:5},
        ],
        platforms:["Google News","AP News","ChatGPT","Bloomberg Terminal","MuckRack","Crunchbase","Moody's Analytics","Yahoo News","Bing News"],
        notableReprints: tvMatches.slice(0,8).map(m=>m.trim()),
      };
    }

    // ── Upload Zone ────────────────────────────────────────────────────────────
    function UploadZone({ onUpload, compact }) {
      const [drag, setDrag] = useState(false);
      const ref = useRef();
      const go = f => { if (!f) return; const r=new FileReader(); r.onload=e=>onUpload(e.target.result,f.name); r.readAsText(f); };
      if (compact) return (
        <label style={{ padding:"8px 18px", borderRadius:8, border:`1.5px dashed ${B.iceBlue}`, cursor:"pointer", fontSize:12, color:B.blue, fontWeight:600, background:B.offWhite }}>
          + Upload Report <input type="file" accept=".txt,.csv" style={{display:"none"}} onChange={e=>go(e.target.files[0])} />
        </label>
      );
      return (
        <div onClick={()=>ref.current?.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);go(e.dataTransfer.files[0]);}}
          style={{ border:`2px dashed ${drag?B.blue:B.iceBlue}`, borderRadius:16, padding:"40px 32px", textAlign:"center", cursor:"pointer", background:drag?"#EEF6FC":B.offWhite }}>
          <input ref={ref} type="file" accept=".txt,.csv" style={{display:"none"}} onChange={e=>go(e.target.files[0])} />
          <div style={{fontSize:36,marginBottom:10}}>📊</div>
          <div style={{fontSize:15,fontWeight:700,color:B.navy,marginBottom:4}}>Upload EIN Presswire Report</div>
          <div style={{fontSize:12,color:B.gray}}>Drag & drop a .txt export, or click to browse</div>
          <div style={{marginTop:14,display:"inline-block",padding:"9px 22px",background:B.blue,color:B.white,borderRadius:8,fontSize:12,fontWeight:600}}>Choose File</div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 1 — EARNED MEDIA
    // ════════════════════════════════════════════════════════════════════════
    function EarnedMediaTab() {
      const [reports, setReports] = usePersistedState("reports", []);
      const [selected, setSelected] = useState(null);
      const [view, setView] = useState("overview");

      const handleUpload = useCallback((text, name) => {
        const parsed = parseEINReport(text);
        const r = { ...parsed, fileName:name, id:Date.now() };
        setReports(prev => { const u=[...prev,r]; setSelected(r.id); setView("detail"); return u; });
      }, []);

      const loadDemo = () => {
        const demo = {
          id:1, fileName:"RPM_WeightManagement_Dec2025.txt",
          title:"New Survey Shows RPM Healthcare's Digital Weight Management Program Driving Weight Loss and Improved Medication Access",
          date:"December 19, 2025 23:23 GMT", totalOutlets:156, wordCount:449, tvCount:87,
          channels:["Healthcare & Pharma","IT / Technology","Insurance","Technology"],
          usTargets:211, njTargets:102,
          outletData:[{name:"TV/Broadcast",count:87,color:B.blue},{name:"Digital News",count:40,color:B.skyBlue},{name:"Trade Pubs",count:20,color:B.iceBlue},{name:"Major Wires",count:9,color:"#5B8DB8"}],
          geoData:[{state:"TX",count:18},{state:"VA",count:11},{state:"NJ",count:12},{state:"NY",count:10},{state:"CA",count:9},{state:"OH",count:8},{state:"FL",count:7},{state:"IL",count:6},{state:"GA",count:6},{state:"NC",count:5}],
          platforms:["Google News","AP News","ChatGPT","Bloomberg Terminal","MuckRack","Crunchbase","Moody's Analytics","Yahoo News","Bing News"],
          notableReprints:["WFLA NBC 8 (Tampa FL)","WGN 9 (Chicago IL)","KRON MyNetworkTV 4 (San Francisco CA)","WPIX CW 11 (New York City NY)","KXAN NBC 36 (Austin TX)","KOIN CBS 6 (Portland OR)","WKRN ABC 2 (Nashville TN)","KDVR FOX 31 (Denver CO)"],
        };
        setReports([demo]); setSelected(1); setView("detail");
      };

      const active = reports.find(r=>r.id===selected);

      return (
        <div>
          {reports.length === 0 && (
            <div>
              <div style={{textAlign:"center",marginBottom:28}}>
                <h2 style={{margin:"0 0 6px",fontSize:24,fontWeight:800,color:B.navy,fontFamily:"Georgia,serif"}}>Earned Media Intelligence</h2>
                <p style={{margin:0,color:B.gray,fontSize:14}}>Upload your EIN Presswire distribution reports to visualize your media reach.</p>
              </div>
              <div style={{maxWidth:520,margin:"0 auto 20px"}}><UploadZone onUpload={handleUpload} /></div>
              <div style={{textAlign:"center"}}>
                <button onClick={loadDemo} style={{background:"none",border:"none",color:B.blue,cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Load demo (December 2025 Weight Management release)</button>
              </div>
            </div>
          )}
          {reports.length > 0 && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div style={{display:"flex",gap:6}}>
                  {["overview","detail"].map(v=>(
                    <button key={v} onClick={()=>setView(v)} style={{padding:"7px 16px",borderRadius:8,border:`1.5px solid ${view===v?B.blue:B.iceBlue}`,background:view===v?B.blue:B.white,color:view===v?B.white:B.navy,cursor:"pointer",fontSize:12,fontWeight:600,textTransform:"capitalize"}}>{v}</button>
                  ))}
                </div>
                <UploadZone onUpload={handleUpload} compact />
              </div>
              {view==="overview" && (
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
                    <StatCard label="Total Releases" value={reports.length} sub="Tracked this period" accent={B.blue} />
                    <StatCard label="Total Placements" value={reports.reduce((s,r)=>s+r.totalOutlets,0).toLocaleString()} sub="All distributions" accent={B.skyBlue} />
                    <StatCard label="Avg Outlets/Release" value={Math.round(reports.reduce((s,r)=>s+r.totalOutlets,0)/reports.length)} sub="Per distribution" accent={B.iceBlue} />
                    <StatCard label="Major Wire Networks" value="9" sub="AP, Google, Bloomberg+" accent="#2E86C1" />
                  </div>
                  <Card>
                    <SectionTitle>All Press Releases</SectionTitle>
                    {reports.map(r=>(
                      <div key={r.id} onClick={()=>{setSelected(r.id);setView("detail");}}
                        style={{padding:"14px 0",borderBottom:`1px solid ${B.lightBg}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:B.navy,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:640}}>{r.title}</div>
                          <div style={{fontSize:11,color:B.gray}}>{r.date} · {r.fileName}</div>
                        </div>
                        <div style={{display:"flex",gap:20,marginLeft:20,flexShrink:0}}>
                          {[{l:"Outlets",v:r.totalOutlets,c:B.blue},{l:"TV",v:r.tvCount,c:B.skyBlue}].map(({l,v,c})=>(
                            <div key={l} style={{textAlign:"right"}}>
                              <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
                              <div style={{fontSize:10,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </Card>
                </div>
              )}
              {view==="detail" && active && (
                <div>
                  {reports.length>1 && (
                    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                      {reports.map(r=>(
                        <button key={r.id} onClick={()=>setSelected(r.id)} style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${r.id===selected?B.blue:B.iceBlue}`,background:r.id===selected?B.blue:B.white,color:r.id===selected?B.white:B.navy,cursor:"pointer",fontSize:11,fontWeight:600}}>
                          {r.date.split(" ").slice(0,2).join(" ")}
                        </button>
                      ))}
                    </div>
                  )}
                  <div style={{background:`linear-gradient(135deg,${B.navy},${B.navyMid})`,borderRadius:14,padding:"22px 26px",marginBottom:22,boxShadow:"0 4px 20px rgba(13,31,60,0.15)"}}>
                    <div style={{fontSize:10,fontWeight:700,color:B.skyBlue,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>Press Release</div>
                    <h2 style={{margin:"0 0 10px",fontSize:17,fontWeight:800,color:B.white,lineHeight:1.4,fontFamily:"Georgia,serif"}}>{active.title}</h2>
                    <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:B.iceBlue}}>📅 {active.date}</span>
                      {active.wordCount && <span style={{fontSize:11,color:B.iceBlue}}>✍️ {active.wordCount} words</span>}
                      <span style={{fontSize:11,color:B.iceBlue}}>📡 EIN Presswire</span>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
                    <StatCard label="Total Outlets" value={active.totalOutlets} sub="Verified placements" accent={B.blue} />
                    <StatCard label="TV / Broadcast" value={active.tvCount} sub="Local & network stations" accent={B.skyBlue} />
                    <StatCard label="US Media Targets" value={active.usTargets.toLocaleString()} sub="Journalists contacted" accent={B.iceBlue} />
                    <StatCard label="Channels" value={active.channels.length} sub={active.channels[0]||"—"} accent="#2E86C1" />
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
                    <Card>
                      <SectionTitle>Outlet Type Breakdown</SectionTitle>
                      <div style={{display:"flex",alignItems:"center"}}>
                        <ResponsiveContainer width="55%" height={180}>

      const blankForm = { title:"", date:"", topic:TOPICS[0], status:"Draft", wire:"EIN Presswire", oneDriveUrl:"", notes:"" };
      const [form, setForm] = useState(blankForm);

      const [formError, setFormError] = useState("");
      const openNew = () => { setForm(blankForm); setEditingId(null); setFormError(""); setShowForm(true); };
      const openEdit = (r) => { setForm({...r}); setEditingId(r.id); setFormError(""); setShowForm(true); };
      const deleteRelease = (id) => setReleases(prev=>prev.filter(r=>r.id!==id));
      const saveForm = () => {
        if (!form.title.trim()) { setFormError("Please enter a headline."); return; }
        if (editingId) setReleases(prev=>prev.map(r=>r.id===editingId?{...form,id:editingId}:r));
        else setReleases(prev=>[...prev,{...form,id:Date.now()}]);
        setShowForm(false); setEditingId(null); setFormError("");
      };
      const toggleSort = (field) => { if (sortBy===field) setSortDir(d=>d==="asc"?"desc":"asc"); else { setSortBy(field); setSortDir("asc"); } };
      const filtered = releases
        .filter(r=>filterTopic==="All"||r.topic===filterTopic)
        .filter(r=>filterStatus==="All"||r.status===filterStatus)
        .filter(r=>!searchQ||r.title.toLowerCase().includes(searchQ.toLowerCase())||r.notes.toLowerCase().includes(searchQ.toLowerCase()))
        .sort((a,b)=>{
          let av=a[sortBy]||"",bv=b[sortBy]||"";
          if(sortBy==="date"){av=new Date(av);bv=new Date(bv);}
          return sortDir==="asc"?(av>bv?1:-1):(av<bv?1:-1);
        });
      const byMonth = filtered.reduce((acc,r)=>{ const k=r.date?r.date.slice(0,7):"No Date"; if(!acc[k])acc[k]=[]; acc[k].push(r); return acc; },{});
      const topicCounts = TOPICS.map(t=>({name:t.split(" ")[0],count:releases.filter(r=>r.topic===t).length,full:t})).filter(t=>t.count>0);
      const statusCounts = STATUSES.map(s=>({name:s,count:releases.filter(r=>r.status===s).length,color:STATUS_COLORS[s]})).filter(s=>s.count>0);
      const SortArrow = ({field}) => <span style={{marginLeft:3,color:sortBy===field?B.blue:B.gray,fontSize:9}}>{sortBy===field?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>;

      return (

                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Topic</label>
                    <select value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,background:B.white,boxSizing:"border-box"}}>
                      {TOPICS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Wire Service</label>
                    <input value={form.wire} onChange={e=>setForm({...form,wire:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>OneDrive Link</label>
                  <input type="url" value={form.oneDriveUrl} onChange={e=>setForm({...form,oneDriveUrl:e.target.value})} placeholder="https://onedrive.live.com/..." style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
                </div>
                <div style={{marginBottom:22}}>
                  <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Notes</label>
                  <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                </div>
                {formError && <div style={{marginBottom:12,padding:"9px 12px",borderRadius:8,background:"#FFF0F0",border:`1px solid ${B.red}`,fontSize:12,color:B.red,fontWeight:600}}>{formError}</div>}
                <div style={{display:"flex",gap:10}}>
                  <button onClick={saveForm} style={{flex:1,padding:"11px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>{editingId?"Save Changes":"Add Press Release"}</button>
                  <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"11px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
            <StatCard label="Total Releases" value={releases.length} sub="All time" accent={B.blue} />
            <StatCard label="Published" value={releases.filter(r=>r.status==="Published").length} sub="Live releases" accent={B.green} />
            <StatCard label="In Pipeline" value={releases.filter(r=>r.status!=="Published").length} sub="Draft / Scheduled / Review" accent={B.amber} />
            <StatCard label="Topics Covered" value={new Set(releases.map(r=>r.topic)).size} sub={`of ${TOPICS.length} total`} accent={B.skyBlue} />
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:22}}>
            <Card>
              <SectionTitle>Releases by Topic</SectionTitle>
              <ResponsiveContainer width="100%" height={140}>
                <BarChart data={topicCounts} barSize={14} layout="vertical">
                  <XAxis type="number" tick={{fontSize:10,fill:B.gray}} axisLine={false} tickLine={false}/>
                  <YAxis type="category" dataKey="name" tick={{fontSize:10,fill:B.navy}} axisLine={false} tickLine={false} width={70}/>
                  <Tooltip formatter={(v,_,p)=>[v,p.payload.full]} cursor={{fill:"rgba(77,168,218,0.06)"}}/>
                  <Bar dataKey="count" fill={B.blue} radius={[0,4,4,0]}>
                    {topicCounts.map((_,i)=><Cell key={i} fill={i===0?B.navy:i===1?B.blue:B.skyBlue}/>)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionTitle>Releases by Status</SectionTitle>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <ResponsiveContainer width={140} height={140}>
                  <PieChart><Pie data={statusCounts} dataKey="count" innerRadius={42} outerRadius={65} paddingAngle={3}>
                    {statusCounts.map((s,i)=><Cell key={i} fill={s.color}/>)}
                  </Pie><Tooltip formatter={(v,n)=>[v,n]}/></PieChart>
                </ResponsiveContainer>
                <div style={{flex:1}}>
                  {statusCounts.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:B.navy,flex:1}}>{s.name}</span>
                      <span style={{fontSize:14,fontWeight:800,color:B.navy}}>{s.count}</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
          </div>

          <Card style={{marginBottom:18}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search releases…" style={{flex:1,minWidth:180,padding:"8px 12px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,outline:"none"}} />
              <select value={filterTopic} onChange={e=>setFilterTopic(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                <option value="All">All Topics</option>
                {TOPICS.map(t=><option key={t}>{t}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                <option value="All">All Statuses</option>
                {STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",gap:2,borderRadius:8,overflow:"hidden",border:`1.5px solid ${B.iceBlue}`}}>
                {[["table","☰"],["timeline","📅"]].map(([v,icon])=>(
                  <button key={v} onClick={()=>setViewMode(v)} style={{padding:"7px 13px",border:"none",cursor:"pointer",background:viewMode===v?B.navy:B.white,color:viewMode===v?B.white:B.gray,fontSize:13,fontWeight:700}}>{icon}</button>
                ))}
              </div>
              <button onClick={openNew} style={{padding:"8px 18px",borderRadius:8,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>+ Add Release</button>
            </div>
            {filtered.length!==releases.length && <div style={{marginTop:8,fontSize:11,color:B.gray}}>Showing {filtered.length} of {releases.length} releases</div>}
          </Card>

          {viewMode==="table" && (
            <Card style={{padding:0,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:`linear-gradient(135deg,${B.navy},${B.navyMid})`}}>
                    {[["title","Headline"],["date","Date"],["topic","Topic"],["status","Status"],["wire","Wire"],["","OneDrive"],["","Actions"]].map(([field,label],i)=>(
                      <th key={i} onClick={field?()=>toggleSort(field):undefined} style={{padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:B.white,letterSpacing:"0.1em",textTransform:"uppercase",cursor:field?"pointer":"default",whiteSpace:"nowrap",userSelect:"none"}}>
                        {label}{field&&<SortArrow field={field}/>}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length===0 && <tr><td colSpan={7} style={{padding:"40px",textAlign:"center",color:B.gray,fontSize:13}}>No releases match your filters.</td></tr>}
                  {filtered.map((r,i)=>(
                    <tr key={r.id} style={{borderBottom:`1px solid ${B.lightBg}`,background:i%2===0?B.white:B.offWhite}}>
                      <td style={{padding:"14px 16px",maxWidth:340}}>
                        <div style={{fontSize:12,fontWeight:700,color:B.navy,lineHeight:1.4}}>{r.title}</div>
                        {r.notes&&<div style={{fontSize:10,color:B.gray,marginTop:3,lineHeight:1.4}}>{r.notes}</div>}
                      </td>
                      <td style={{padding:"14px 16px",whiteSpace:"nowrap"}}>
                        <div style={{fontSize:12,color:B.navy,fontWeight:600}}>{r.date?new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}</div>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:B.lightBg,color:B.navy,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{r.topic}</div>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:`${STATUS_COLORS[r.status]}18`,border:`1px solid ${STATUS_COLORS[r.status]}40`}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:STATUS_COLORS[r.status],flexShrink:0}}/>
                          <span style={{fontSize:10,fontWeight:700,color:STATUS_COLORS[r.status],whiteSpace:"nowrap"}}>{r.status}</span>
                        </div>
                      </td>
                      <td style={{padding:"14px 16px",fontSize:11,color:B.gray,whiteSpace:"nowrap"}}>{r.wire||"—"}</td>
                      <td style={{padding:"14px 16px"}}>
                        {r.oneDriveUrl
                          ? <a href={r.oneDriveUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:7,background:"#E8F0FE",color:"#1A73E8",fontSize:11,fontWeight:600,textDecoration:"none",whiteSpace:"nowrap"}}>📄 Open</a>
                          : <span style={{fontSize:11,color:B.gray,fontStyle:"italic"}}>No link</span>
                        }
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>openEdit(r)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.blue,cursor:"pointer",fontSize:10,fontWeight:600}}>Edit</button>
                          <button onClick={()=>deleteRelease(r.id)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10,fontWeight:600}}>Del</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          )}

          {viewMode==="timeline" && (
            <div>
              {Object.keys(byMonth).sort((a,b)=>sortDir==="desc"?b.localeCompare(a):a.localeCompare(b)).map(month=>(
                <div key={month} style={{marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div style={{padding:"5px 16px",borderRadius:20,background:`linear-gradient(135deg,${B.navy},${B.blue})`,color:B.white,fontSize:11,fontWeight:800,letterSpacing:"0.1em"}}>
                      {month==="No Date"?"No Date":new Date(month+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"})}
                    </div>
                    <div style={{flex:1,height:1,background:B.iceBlue}}/>
                    <div style={{fontSize:11,color:B.gray}}>{byMonth[month].length} release{byMonth[month].length!==1?"s":""}</div>
                  </div>
                  <div style={{paddingLeft:16,borderLeft:`3px solid ${B.iceBlue}`,display:"flex",flexDirection:"column",gap:10}}>
                    {byMonth[month].map(r=>(
                      <div key={r.id} style={{background:B.white,borderRadius:12,padding:"14px 18px",boxShadow:"0 2px 10px rgba(13,31,60,0.06)",display:"flex",alignItems:"flex-start",gap:14}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:2}}>
                          <div style={{width:10,height:10,borderRadius:"50%",background:STATUS_COLORS[r.status],border:`2px solid ${B.white}`,boxShadow:`0 0 0 2px ${STATUS_COLORS[r.status]}40`,flexShrink:0}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:4}}>
                            <div style={{fontSize:13,fontWeight:700,color:B.navy,lineHeight:1.4}}>{r.title}</div>
                            <div style={{padding:"2px 9px",borderRadius:20,background:`${STATUS_COLORS[r.status]}18`,border:`1px solid ${STATUS_COLORS[r.status]}40`,fontSize:9,fontWeight:700,color:STATUS_COLORS[r.status],whiteSpace:"nowrap",flexShrink:0}}>{r.status}</div>
                          </div>
                          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                            <span style={{fontSize:10,color:B.gray}}>📅 {r.date?new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"No date"}</span>
                            <span style={{padding:"2px 8px",borderRadius:10,background:B.lightBg,fontSize:10,fontWeight:600,color:B.navy}}>{r.topic}</span>
                            {r.wire&&<span style={{fontSize:10,color:B.gray}}>📡 {r.wire}</span>}
                            {r.oneDriveUrl&&<a href={r.oneDriveUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#1A73E8",fontWeight:600,textDecoration:"none"}}>📄 OneDrive</a>}
                          </div>
                          {r.notes&&<div style={{fontSize:11,color:B.gray,marginTop:5,lineHeight:1.5}}>{r.notes}</div>}
                        </div>
                        <div style={{display:"flex",gap:5,flexShrink:0}}>
                          <button onClick={()=>openEdit(r)} style={{padding:"4px 9px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.blue,cursor:"pointer",fontSize:10,fontWeight:600}}>Edit</button>
                          <button onClick={()=>deleteRelease(r.id)} style={{padding:"4px 9px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10,fontWeight:600}}>Del</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {filtered.length===0&&(
                <Card style={{textAlign:"center",padding:"48px",color:B.gray}}>
                  <div style={{fontSize:32,marginBottom:10}}>📭</div>
                  <div style={{fontSize:14,fontWeight:600,color:B.navy,marginBottom:6}}>No releases yet</div>
                  <div style={{fontSize:12}}>Click "+ Add Release" to start mapping your content.</div>
                </Card>
              )}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 4 — PODCAST OUTREACH
    // ════════════════════════════════════════════════════════════════════════
    const OUTREACH_STATUSES = ["Not Started","Researching","Contacted","Follow-Up Sent","Booked","Aired","Declined"];
    const OUTREACH_COLORS = {
      "Not Started":"#94A3B8","Researching":B.amber,"Contacted":B.blue,
      "Follow-Up Sent":"#8E44AD","Booked":B.green,"Aired":"#0E7490","Declined":B.red
    };

    const SEED_PODCASTS = [
      { id:1, name:"Becker's Healthcare Podcast", audience:"Hospital CEOs, CFOs, COOs, system administrators", why:"One of the most listened-to podcasts among C-suite executives; includes a Digital Health + Health IT sub-show that aligns directly with RPM's space", format:"Daily 15-minute episodes, low lift, high reach", contact:"beckershealthcare.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:2, name:"This Week Health / The 229 Podcast", audience:"CIOs, CNIOs, digital health decision-makers in health systems", why:"Hosted by Bill Russell, Drex DeFord, and Sarah Richardson; loyal base of health IT and health system leaders actively transforming the industry", format:"Medium form, ~23 minutes", contact:"thisweekhealth.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:3, name:"The Healthcare Executive Podcast (ACHE)", audience:"Hospital presidents, CMOs, COOs, health system executives", why:"Official podcast of the American College of Healthcare Executives; covers technological innovation in healthcare", format:"Interview-based", contact:"ache.org", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:4, name:"Advancing Health (American Hospital Association)", audience:"Hospital system leadership, policy-focused C-suite", why:"AHA's official podcast featuring conversations with hospital and health system leaders; the AHA brand lends credibility with decision-makers", format:"Conversational interviews", contact:"aha.org/advancing-health-podcast", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:5, name:"CHIME Digital Health Leaders Podcast", audience:"Health system CIOs, digital health executives", why:"Hosted by CHIME's President and CEO; reaches the CIOs and health IT executives who greenlight technology adoption", format:"~31 minutes", contact:"chimecentral.org", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:6, name:"Chief Healthcare Executive Podcast (Healthy Bottom Line)", audience:"Hospital executives focused on financial sustainability and innovation", why:"Covers telemedicine, hospital-at-home, and health system partnerships; strong platform for RPM Healthcare's president to make the ROI and operational case", format:"Conversational, news-driven", contact:"chiefhealthcareexecutive.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
    ];

    function PodcastTab() {
      const [podcasts, setPodcasts] = usePersistedState("podcasts", SEED_PODCASTS);
      const [selected, setSelected] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editData, setEditData] = useState(null);
      const [filterStatus, setFilterStatus] = useState("All");
      const [showAddNew, setShowAddNew] = useState(false);
      const [newPodcast, setNewPodcast] = useState({ name:"", audience:"", why:"", format:"", contact:"", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" });

      const statusCounts = OUTREACH_STATUSES.map(s=>({ name:s, count:podcasts.filter(p=>p.status===s).length, color:OUTREACH_COLORS[s] }));
      const booked = podcasts.filter(p=>p.status==="Booked"||p.status==="Aired").length;
      const inProgress = podcasts.filter(p=>["Researching","Contacted","Follow-Up Sent"].includes(p.status)).length;

      const updateStatus = (id, status) => setPodcasts(prev => prev.map(p => p.id===id ? {...p, status} : p));
      const updateField = (id, field, val) => setPodcasts(prev => prev.map(p => p.id===id ? {...p, [field]:val} : p));
      const openEdit = (p) => { setEditData({...p}); setShowForm(true); };
      const saveEdit = () => { setPodcasts(prev=>prev.map(p=>p.id===editData.id?editData:p)); setShowForm(false); setEditData(null); };
      const deletePodcast = (id) => { setPodcasts(prev=>prev.filter(p=>p.id!==id)); if(selected===id) setSelected(null); };

      const addNewPodcast = () => {
        if (!newPodcast.name.trim()) return;
        setPodcasts(prev=>[...prev,{...newPodcast,id:Date.now()}]);
        setNewPodcast({ name:"", audience:"", why:"", format:"", contact:"", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" });
        setShowAddNew(false);
      };

      const filtered = filterStatus==="All" ? podcasts : podcasts.filter(p=>p.status===filterStatus);
      const sel = podcasts.find(p=>p.id===selected);

      return (
        <div>
          {/* Edit Modal */}
          {showForm && editData && (
            <div style={{position:"fixed",inset:0,background:"rgba(13,31,60,0.65)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:B.white,borderRadius:18,padding:28,width:560,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0,fontSize:16,fontWeight:800,color:B.navy}}>Edit Podcast</h3>
                  <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.gray}}>✕</button>
                </div>
                {[["name","Podcast Name"],["audience","Audience"],["why","Why It Fits"],["format","Format"],["contact","Contact / Website"],["pitchAngle","Pitch Angle"],["notes","Notes"],["episode","Episode / Air Date"]].map(([k,label])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{label}</label>
                    <textarea value={editData[k]||""} onChange={e=>setEditData({...editData,[k]:e.target.value})} rows={k==="why"||k==="notes"?3:1} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box",lineHeight:1.5}} />
                  </div>
                ))}
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Status</label>
                  <select value={editData.status} onChange={e=>setEditData({...editData,status:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                    {OUTREACH_STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Follow-Up Date</label>
                  <input type="date" value={editData.followUpDate||""} onChange={e=>setEditData({...editData,followUpDate:e.target.value})} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,width:"100%",boxSizing:"border-box"}} />
                </div>
                <div style={{display:"flex",gap:10,marginTop:4}}>
                  <button onClick={saveEdit} style={{flex:1,padding:"10px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>Save</button>
                  <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"10px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Add New Modal */}
          {showAddNew && (
            <div style={{position:"fixed",inset:0,background:"rgba(13,31,60,0.65)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:B.white,borderRadius:18,padding:28,width:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0,fontSize:16,fontWeight:800,color:B.navy}}>Add Podcast</h3>
                  <button onClick={()=>setShowAddNew(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.gray}}>✕</button>
                </div>
                {[["name","Podcast Name *"],["audience","Audience"],["why","Why It Fits"],["format","Format"],["contact","Contact / Website"],["notes","Notes"]].map(([k,label])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{label}</label>
                    <textarea value={newPodcast[k]||""} onChange={e=>setNewPodcast({...newPodcast,[k]:e.target.value})} rows={k==="why"?2:1} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                  </div>
                ))}
                <div style={{display:"flex",gap:10,marginTop:4}}>
                  <button onClick={addNewPodcast} style={{flex:1,padding:"10px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>Add Podcast</button>
                  <button onClick={()=>setShowAddNew(false)} style={{flex:1,padding:"10px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
            <StatCard label="Total Targets" value={podcasts.length} sub="On outreach list" accent={B.blue} />
            <StatCard label="In Progress" value={inProgress} sub="Contacted or researching" accent={B.amber} />
            <StatCard label="Booked / Aired" value={booked} sub="Confirmed appearances" accent={B.green} />
            <StatCard label="Remaining" value={podcasts.filter(p=>p.status==="Not Started").length} sub="Not yet contacted" accent={B.gray} />
          </div>

          {/* Status pipeline bar */}
          <Card style={{marginBottom:18}}>
            <SectionTitle>Outreach Pipeline</SectionTitle>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {statusCounts.map((s,i)=>(
                <div key={i} onClick={()=>setFilterStatus(filterStatus===s.name?"All":s.name)} style={{flex:"1 1 auto",minWidth:90,padding:"10px 12px",borderRadius:10,background:filterStatus===s.name?s.color:B.lightBg,cursor:"pointer",border:`2px solid ${filterStatus===s.name?s.color:B.iceBlue}`,transition:"all 0.15s",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:filterStatus===s.name?B.white:B.navy}}>{s.count}</div>
                  <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:filterStatus===s.name?B.white:s.color,marginTop:2}}>{s.name}</div>
                </div>
              ))}
            </div>
            {filterStatus!=="All" && <div style={{marginTop:8,fontSize:11,color:B.gray}}>Showing <strong>{filterStatus}</strong> · <span onClick={()=>setFilterStatus("All")} style={{color:B.blue,cursor:"pointer",textDecoration:"underline"}}>Clear filter</span></div>}
          </Card>

          <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:20,alignItems:"start"}}>
            {/* Left: Podcast list */}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:B.navy,textTransform:"uppercase",letterSpacing:"0.1em"}}>{filtered.length} Podcast{filtered.length!==1?"s":""}</div>
                <button onClick={()=>setShowAddNew(true)} style={{padding:"6px 14px",borderRadius:8,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add</button>
              </div>
              {filtered.map(p=>(
                <div key={p.id} onClick={()=>setSelected(selected===p.id?null:p.id)}
                  style={{borderRadius:12,border:`1.5px solid ${selected===p.id?B.blue:B.iceBlue}`,background:selected===p.id?B.lightBg:B.white,cursor:"pointer",overflow:"hidden",transition:"all 0.15s",boxShadow:selected===p.id?"0 4px 16px rgba(27,107,170,0.12)":"none"}}>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                      <div style={{fontSize:12,fontWeight:700,color:B.navy,lineHeight:1.4,flex:1}}>{p.name}</div>
                      <div style={{padding:"2px 8px",borderRadius:10,background:`${OUTREACH_COLORS[p.status]}18`,border:`1px solid ${OUTREACH_COLORS[p.status]}50`,flexShrink:0}}>
                        <span style={{fontSize:9,fontWeight:700,color:OUTREACH_COLORS[p.status],whiteSpace:"nowrap"}}>{p.status}</span>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:B.gray,lineHeight:1.4,marginBottom:6}}>{p.audience}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <select value={p.status} onClick={e=>e.stopPropagation()} onChange={e=>updateStatus(p.id,e.target.value)}
                        style={{flex:1,padding:"4px 7px",borderRadius:7,border:`1px solid ${B.iceBlue}`,fontSize:10,color:B.navy,background:B.white,cursor:"pointer"}}>
                        {OUTREACH_STATUSES.map(s=><option key={s}>{s}</option>)}
                      </select>
                      <button onClick={e=>{e.stopPropagation();openEdit(p);}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.gray,cursor:"pointer",fontSize:10}}>✎</button>
                      <button onClick={e=>{e.stopPropagation();deletePodcast(p.id);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10}}>✕</button>
                    </div>
                    {p.followUpDate && <div style={{marginTop:6,fontSize:10,color:B.amber,fontWeight:600}}>📅 Follow-up: {new Date(p.followUpDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>}
                    {p.episode && <div style={{marginTop:3,fontSize:10,color:B.green,fontWeight:600}}>🎙 {p.episode}</div>}
                  </div>
                </div>
              ))}
            </div>

            {/* Right: Detail + AI panel */}
            <div style={{display:"flex",flexDirection:"column",gap:18}}>

              {/* Detail panel */}
              {sel ? (
                <Card style={{borderTop:`4px solid ${OUTREACH_COLORS[sel.status]}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <div>
                      <div style={{fontSize:17,fontWeight:800,color:B.navy,marginBottom:4,fontFamily:"Georgia,serif"}}>{sel.name}</div>
                      <a href={sel.contact.startsWith("http")?sel.contact:"https://"+sel.contact} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:B.blue,textDecoration:"none",fontWeight:600}}>↗ {sel.contact}</a>
                    </div>
                    <button onClick={()=>openEdit(sel)} style={{padding:"7px 16px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,background:B.white,color:B.navy,cursor:"pointer",fontSize:11,fontWeight:600,flexShrink:0}}>Edit Details</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                    {[["🎙 Format",sel.format],["👥 Audience",sel.audience]].map(([k,v])=>(
                      <div key={k} style={{padding:"10px 12px",background:B.lightBg,borderRadius:9}}>
                        <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{k}</div>
                        <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{v||"—"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"11px 13px",background:B.lightBg,borderRadius:9,marginBottom:12,borderLeft:`3px solid ${B.blue}`}}>
                    <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Why It Fits RPM Healthcare</div>
                    <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.why||"—"}</div>
                  </div>
                  {sel.pitchAngle && (
                    <div style={{padding:"11px 13px",background:"#FFF9E6",borderRadius:9,marginBottom:12,borderLeft:`3px solid ${B.amber}`}}>
                      <div style={{fontSize:9,fontWeight:700,color:B.amber,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Pitch Angle</div>
                      <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.pitchAngle}</div>
                    </div>
                  )}
                  {sel.notes && (
                    <div style={{padding:"10px 12px",background:B.lightBg,borderRadius:9,marginBottom:12}}>
                      <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Notes</div>
                      <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.notes}</div>
                    </div>
                  )}
                  {/* Notes quick-edit */}
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Quick Note</label>
                    <textarea value={sel.notes||""} onChange={e=>updateField(sel.id,"notes",e.target.value)} placeholder="Add notes, contact name, last interaction…" rows={2}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                  </div>
                </Card>
              ) : (
                <Card style={{textAlign:"center",padding:"40px 24px",border:`1.5px dashed ${B.iceBlue}`}}>
                  <div style={{fontSize:32,marginBottom:10}}>🎙</div>
                  <div style={{fontSize:14,fontWeight:700,color:B.navy,marginBottom:6}}>Select a podcast to view details</div>
                  <div style={{fontSize:12,color:B.gray}}>Click any podcast on the left to see fit analysis and manage outreach status.</div>
                </Card>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 5 — SETTINGS / DASHBOARD METADATA
    // ════════════════════════════════════════════════════════════════════════
    const DEFAULT_META = {
      dashboardTitle: "Market Positioning Dashboard",
      subtitle: "Competitive Intelligence · Earned Media · Content Strategy",
      companyName: "RPM Healthcare",
      reportPeriod: "Q1–Q2 2026",
      preparedBy: "",
      distributionDate: new Date().toISOString().slice(0,10),
      distributionList: "",
      confidentialityNotice: "Confidential — Internal Use Only",
      logoTagline: "HEALTHCARE™",
      footerNote: "Data sourced from public web, EIN Presswire reports, and internal analysis.",
    };

    function SettingsTab() {
      const [meta, setMeta] = usePersistedState("dashboardMeta", DEFAULT_META);
      const [saved, setSaved] = useState(false);

      const update = (k, v) => setMeta(prev => ({ ...prev, [k]: v }));
      const handleSave = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };
      const handleReset = () => { if (window.confirm("Reset all settings to defaults?")) setMeta(DEFAULT_META); };

      const Field = ({ label, k, type="text", placeholder="", hint="" }) => (
        <div style={{marginBottom:18}}>
          <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>{label}</label>
          {type==="textarea"
            ? <textarea value={meta[k]||""} onChange={e=>update(k,e.target.value)} placeholder={placeholder} rows={3} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
            : <input type={type} value={meta[k]||""} onChange={e=>update(k,e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
          }
          {hint && <div style={{fontSize:11,color:B.gray,marginTop:4}}>{hint}</div>}
        </div>
      );

      return (
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <div style={{marginBottom:28}}>
            <h2 style={{margin:"0 0 6px",fontSize:22,fontWeight:800,color:B.navy,fontFamily:"Georgia,serif"}}>Dashboard Settings</h2>
            <p style={{margin:0,color:B.gray,fontSize:14}}>Edit titles, distribution info, and metadata. All changes save automatically to your browser.</p>
          </div>

          {/* Live Preview */}
          <Card style={{marginBottom:24,borderTop:`4px solid ${B.blue}`,background:`linear-gradient(135deg,${B.navy}08,${B.blue}06)`}}>
            <div style={{fontSize:10,fontWeight:700,color:B.blue,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12}}>Live Preview — Header Bar</div>
            <div style={{background:`linear-gradient(135deg,${B.navy},${B.navyMid},${B.blue})`,borderRadius:10,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:0,lineHeight:1}}>
                  <span style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:26,fontWeight:900,color:B.skyBlue,letterSpacing:"-1px"}}>r</span>
                  <span style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:26,fontWeight:900,color:B.white,letterSpacing:"-1px"}}>pm</span>
                  <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:3,paddingLeft:4}}>
                    <span style={{fontFamily:"'Arial Narrow',Arial,sans-serif",fontSize:8,fontWeight:700,color:"#79C8E6",letterSpacing:"2px",textTransform:"uppercase"}}>{meta.logoTagline||"HEALTHCARE™"}</span>
                  </div>
                </div>
                <div style={{borderLeft:"1px solid rgba(255,255,255,0.2)",paddingLeft:14}}>
                  <div style={{fontSize:12,fontWeight:800,color:B.white,letterSpacing:"0.05em"}}>{meta.dashboardTitle||"Market Positioning Dashboard"}</div>
                  {meta.subtitle && <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:1}}>{meta.subtitle}</div>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                {meta.reportPeriod && <div style={{fontSize:10,color:B.iceBlue,fontWeight:600}}>{meta.reportPeriod}</div>}
                {meta.distributionDate && <div style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{new Date(meta.distributionDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>}
              </div>
            </div>
          </Card>

          {/* Distribution Info Card */}
          {(meta.distributionList||meta.preparedBy||meta.confidentialityNotice) && (
            <Card style={{marginBottom:24,borderLeft:`4px solid ${B.amber}`,background:"#FFFBF0"}}>
              <div style={{fontSize:10,fontWeight:700,color:B.amber,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10}}>Distribution Preview</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {meta.preparedBy && <div><span style={{fontSize:10,color:B.gray,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Prepared by: </span><span style={{fontSize:12,color:B.navy}}>{meta.preparedBy}</span></div>}
                {meta.distributionDate && <div><span style={{fontSize:10,color:B.gray,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Date: </span><span style={{fontSize:12,color:B.navy}}>{new Date(meta.distributionDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</span></div>}
                {meta.reportPeriod && <div><span style={{fontSize:10,color:B.gray,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Period: </span><span style={{fontSize:12,color:B.navy}}>{meta.reportPeriod}</span></div>}
                {meta.confidentialityNotice && <div><span style={{fontSize:10,color:B.gray,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Classification: </span><span style={{fontSize:12,color:B.red,fontWeight:600}}>{meta.confidentialityNotice}</span></div>}
              </div>
              {meta.distributionList && <div style={{marginTop:10,padding:"8px 10px",background:B.lightBg,borderRadius:7}}><span style={{fontSize:10,color:B.gray,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>To: </span><span style={{fontSize:11,color:B.navy}}>{meta.distributionList}</span></div>}
            </Card>
          )}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Card>
              <SectionTitle>Dashboard Identity</SectionTitle>
              <Field label="Dashboard Title" k="dashboardTitle" placeholder="Market Positioning Dashboard" />
              <Field label="Subtitle / Tagline" k="subtitle" placeholder="Competitive Intelligence · Earned Media · Content Strategy" hint="Shown below the title in the header" />
              <Field label="Company Name" k="companyName" placeholder="RPM Healthcare" />
              <Field label="Logo Tagline" k="logoTagline" placeholder="HEALTHCARE™" hint="Text shown next to the 'rpm' logo" />
            </Card>
            <Card>
              <SectionTitle>Distribution Info</SectionTitle>
              <Field label="Report Period" k="reportPeriod" placeholder="Q1–Q2 2026" hint="e.g. Q1 2026, January–March 2026" />
              <Field label="Distribution Date" k="distributionDate" type="date" />
              <Field label="Prepared By" k="preparedBy" placeholder="Marketing Team" />
              <Field label="Confidentiality Notice" k="confidentialityNotice" placeholder="Confidential — Internal Use Only" />
            </Card>
          </div>

          <Card style={{marginTop:20}}>
            <SectionTitle>Distribution List</SectionTitle>
            <Field label="Recipients" k="distributionList" type="textarea" placeholder="e.g. Leadership Team, Marketing, Sales — or individual names/emails" hint="Who should receive this report? Shown on the distribution preview above." />
            <Field label="Footer Note" k="footerNote" type="textarea" placeholder="Data sourced from public web, EIN Presswire reports, and internal analysis." hint="Appears at the bottom of the dashboard" />
          </Card>

          <div style={{display:"flex",gap:12,marginTop:20}}>
            <button onClick={handleSave} style={{flex:1,padding:"12px",borderRadius:10,background:saved?B.green:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"background 0.3s"}}>
              {saved ? "✓ Settings Saved" : "Save Settings"}
            </button>
            <button onClick={handleReset} style={{padding:"12px 22px",borderRadius:10,background:B.white,color:B.red,border:`1.5px solid ${B.red}`,cursor:"pointer",fontSize:13,fontWeight:600}}>
              Reset to Defaults
            </button>
          </div>

          <div style={{marginTop:28,padding:"14px 16px",background:B.lightBg,borderRadius:10,fontSize:12,color:B.gray,lineHeight:1.7}}>
            <strong style={{color:B.navy}}>ℹ️ How settings work:</strong> All settings are saved to your browser's local storage automatically. They persist between sessions on the same device. The header bar, distribution preview, and footer reflect your settings in real time. To share with your team, export the HTML file — settings will not transfer unless you include the local storage data.
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // ROOT APP
    // ════════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab] = useState("competitive");
      const [meta] = usePersistedState("dashboardMeta", DEFAULT_META);

      return (
        <div style={{ minHeight:"100vh", background:B.offWhite, fontFamily:"'Trebuchet MS','Segoe UI',sans-serif" }}>
          <div style={{ background:`linear-gradient(135deg,${B.navy} 0%,${B.navyMid} 60%,${B.blue} 100%)`, padding:"0 32px", display:"flex", alignItems:"center", justifyContent:"space-between", height:66, boxShadow:"0 4px 24px rgba(13,31,60,0.25)" }}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <RPMLogo darkBg />
              <div style={{borderLeft:"1px solid rgba(255,255,255,0.2)",paddingLeft:16}}>
                <div style={{fontSize:13,fontWeight:800,color:B.white,letterSpacing:"0.05em"}}>{meta.dashboardTitle||"Market Positioning Dashboard"}</div>
                {meta.subtitle && <div style={{fontSize:10,color:"rgba(255,255,255,0.55)",marginTop:1,letterSpacing:"0.03em"}}>{meta.subtitle}</div>}
              </div>
              <SaveIndicator />
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {meta.reportPeriod && <div style={{fontSize:10,color:B.iceBlue,fontWeight:600,marginRight:8,opacity:0.8}}>{meta.reportPeriod}</div>}
              <div style={{display:"flex",gap:4}}>
                {[["earned","📊 Earned Media"],["competitive","🔭 Competitive Intel"],["contentmap","🗂 Content Map"],["podcasts","🎙 Podcast Outreach"],["settings","⚙️ Settings"]].map(([key,label])=>(
                  <button key={key} onClick={()=>setTab(key)} style={{ padding:"8px 14px", borderRadius:9, border:"none", cursor:"pointer", background:tab===key?"rgba(255,255,255,0.18)":"transparent", color:B.white, fontSize:12, fontWeight:tab===key?700:400, transition:"all 0.15s" }}>{label}</button>
                ))}
              </div>
            </div>
          </div>
          {meta.distributionList||meta.preparedBy ? (
            <div style={{background:`${B.navy}F0`,padding:"6px 32px",display:"flex",gap:24,alignItems:"center"}}>
              {meta.confidentialityNotice && <span style={{fontSize:10,fontWeight:700,color:B.amber,letterSpacing:"0.08em",textTransform:"uppercase"}}>{meta.confidentialityNotice}</span>}
              {meta.preparedBy && <span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>Prepared by: <span style={{color:"rgba(255,255,255,0.8)"}}>{meta.preparedBy}</span></span>}
              {meta.distributionDate && <span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>Distributed: <span style={{color:"rgba(255,255,255,0.8)"}}>{new Date(meta.distributionDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span></span>}
              {meta.distributionList && <span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>To: <span style={{color:"rgba(255,255,255,0.8)"}}>{meta.distributionList}</span></span>}
            </div>
          ) : null}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"28px 24px"}}>
            {tab==="earned"      && <EarnedMediaTab />}
            {tab==="competitive" && <CompetitiveTab />}
            {tab==="contentmap"  && <ContentMapTab />}
            {tab==="podcasts"    && <PodcastTab />}
            {tab==="settings"    && <SettingsTab />}
          </div>
          {meta.footerNote && (
            <div style={{maxWidth:1240,margin:"0 auto",padding:"0 24px 28px"}}>
              <div style={{borderTop:`1px solid ${B.iceBlue}`,paddingTop:14,fontSize:11,color:B.gray}}>{meta.footerNote}</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

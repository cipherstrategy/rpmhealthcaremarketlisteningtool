                                      <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Claimed Differentiator</div>
                                      <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{co.differentiator}</div>
                                    </div>
                                  )}
                                  {co.toneWords?.length>0 && (
                                    <div style={{gridColumn:"1/-1",display:"flex",gap:6,flexWrap:"wrap"}}>
                                      {co.toneWords.map((w,j)=>(
                                        <span key={j} style={{padding:"2px 9px",borderRadius:10,background:co.isRPM?`${B.blue}18`:B.lightBg,color:co.isRPM?B.blue:B.navy,fontSize:10,fontWeight:600}}>{w}</span>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* Themes */}
                    {msgData.themes?.length>0 && (
                      <div style={{marginBottom:20}}>
                        <div style={{fontSize:11,fontWeight:700,color:B.navy,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>🔁 Shared Messaging Themes Across Market</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          {msgData.themes.map((t,i)=>(
                            <div key={i} style={{padding:"10px 14px",background:B.lightBg,borderRadius:10,borderLeft:`3px solid ${B.skyBlue}`}}>
                              <div style={{fontSize:12,fontWeight:700,color:B.navy,marginBottom:3}}>{t.theme}</div>
                              <div style={{fontSize:11,color:B.gray,marginBottom:6,lineHeight:1.5}}>{t.description}</div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                {t.companies?.map((co,j)=>(
                                  <span key={j} style={{fontSize:9,padding:"2px 7px",borderRadius:8,background:co==="RPM Healthcare"?B.blue:B.white,color:co==="RPM Healthcare"?B.white:B.navy,fontWeight:700,border:`1px solid ${co==="RPM Healthcare"?B.blue:B.iceBlue}`}}>{co}</span>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* RPM Gaps + Strengths side by side */}
                    {(msgData.rpmGaps?.length>0 || msgData.rpmStrengths?.length>0) && (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                        {msgData.rpmStrengths?.length>0 && (
                          <div>
                            <div style={{fontSize:11,fontWeight:700,color:B.green,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>✅ RPM Messaging Strengths</div>
                            {msgData.rpmStrengths.map((s,i)=>(
                              <div key={i} style={{marginBottom:8,padding:"10px 12px",background:"#F0FFF8",borderRadius:9,borderLeft:`3px solid ${B.green}`}}>
                                <div style={{fontSize:12,fontWeight:700,color:B.navy,marginBottom:3}}>{s.strength}</div>
                                <div style={{fontSize:11,color:B.gray,lineHeight:1.5}}>{s.detail}</div>
                              </div>
                            ))}
                          </div>
                        )}
                        {msgData.rpmGaps?.length>0 && (
                          <div>
                            <div style={{fontSize:11,fontWeight:700,color:B.amber,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>⚠️ Messaging Gaps to Address</div>
                            {msgData.rpmGaps.map((g,i)=>(
                              <div key={i} style={{marginBottom:8,padding:"10px 12px",background:"#FFFBEB",borderRadius:9,borderLeft:`3px solid ${B.amber}`}}>
                                <div style={{fontSize:12,fontWeight:700,color:B.navy,marginBottom:3}}>{g.gap}</div>
                                <div style={{fontSize:11,color:B.gray,lineHeight:1.5}}>→ {g.recommendation}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {/* Whitespace opportunity */}
                    {msgData.whitespace && (
                      <div style={{padding:"14px 16px",background:`linear-gradient(135deg,${B.navy},${B.navyMid})`,borderRadius:12,marginBottom:8}}>
                        <div style={{fontSize:10,fontWeight:700,color:B.skyBlue,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6}}>🚀 Unclaimed Whitespace — Own This Now</div>
                        <div style={{fontSize:13,color:B.white,lineHeight:1.6}}>{msgData.whitespace}</div>
                      </div>
                    )}

                    {msgData.fetchedAt && <div style={{fontSize:10,color:B.gray,textAlign:"right",marginTop:8}}>Last scanned: {msgData.fetchedAt}</div>}
                  </div>
                )}
              </Card>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 3 — CONTENT MAP
    // ════════════════════════════════════════════════════════════════════════
    const TOPICS = ["Chronic Disease Management","Weight Management","Nurse Burnout","Financial Impact / ROI","Reimbursement & CPT Codes","Population Health","Remote Patient Monitoring","Value-Based Care","Health Equity","Cardiology","Technology & Innovation","Partnerships"];
    const STATUSES = ["Published","Scheduled","Draft","In Review"];
    const STATUS_COLORS = { Published:B.green, Scheduled:B.blue, Draft:B.amber, "In Review":"#8E44AD" };
    const SEED_RELEASES = [
      { id:1, title:"Remote Patient Monitoring Delivers Measurable Financial Returns for Hospital Population Health Departments", date:"2025-12-19", topic:"Financial Impact / ROI", status:"Published", wire:"EIN Presswire", oneDriveUrl:"", notes:"Dr. Angela Bell pull quote. CPT codes 99445, 99470." },
      { id:2, title:"RPM Healthcare Addresses Nurse Burnout Crisis by Reducing Administrative Workload Through Remote Patient Monitoring", date:"2025-12-19", topic:"Nurse Burnout", status:"Published", wire:"EIN Presswire", oneDriveUrl:"", notes:"Cross Country Healthcare/FAU 2025 stat; NCSBN 2024 data." },
      { id:3, title:"New Survey Shows RPM Healthcare's Digital Weight Management Program Driving Weight Loss and Improved Medication Access", date:"2025-12-19", topic:"Weight Management", status:"Published", wire:"EIN Presswire", oneDriveUrl:"", notes:"156 outlets, 87 TV stations. Dec 2025 distribution." },
    ];

    function ContentMapTab() {
      const [releases, setReleases] = useState(SEED_RELEASES);
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [filterTopic, setFilterTopic] = useState("All");
      const [filterStatus, setFilterStatus] = useState("All");
      const [sortBy, setSortBy] = useState("date");
      const [sortDir, setSortDir] = useState("desc");
      const [viewMode, setViewMode] = useState("table");
      const [searchQ, setSearchQ] = useState("");
      const blankForm = { title:"", date:"", topic:TOPICS[0], status:"Draft", wire:"EIN Presswire", oneDriveUrl:"", notes:"" };
      const [form, setForm] = useState(blankForm);

      const [formError, setFormError] = useState("");
      const openNew = () => { setForm(blankForm); setEditingId(null); setFormError(""); setShowForm(true); };
      const openEdit = (r) => { setForm({...r}); setEditingId(r.id); setFormError(""); setShowForm(true); };
      const deleteRelease = (id) => setReleases(prev=>prev.filter(r=>r.id!==id));
      const saveForm = () => {
        if (!form.title.trim()) { setFormError("Please enter a headline."); return; }
        if (editingId) setReleases(prev=>prev.map(r=>r.id===editingId?{...form,id:editingId}:r));
        else setReleases(prev=>[...prev,{...form,id:Date.now()}]);
        setShowForm(false); setEditingId(null); setFormError("");
      };
      const toggleSort = (field) => { if (sortBy===field) setSortDir(d=>d==="asc"?"desc":"asc"); else { setSortBy(field); setSortDir("asc"); } };
      const filtered = releases
        .filter(r=>filterTopic==="All"||r.topic===filterTopic)
        .filter(r=>filterStatus==="All"||r.status===filterStatus)
        .filter(r=>!searchQ||r.title.toLowerCase().includes(searchQ.toLowerCase())||r.notes.toLowerCase().includes(searchQ.toLowerCase()))
        .sort((a,b)=>{
          let av=a[sortBy]||"",bv=b[sortBy]||"";
          if(sortBy==="date"){av=new Date(av);bv=new Date(bv);}
          return sortDir==="asc"?(av>bv?1:-1):(av<bv?1:-1);
        });
      const byMonth = filtered.reduce((acc,r)=>{ const k=r.date?r.date.slice(0,7):"No Date"; if(!acc[k])acc[k]=[]; acc[k].push(r); return acc; },{});
      const topicCounts = TOPICS.map(t=>({name:t.split(" ")[0],count:releases.filter(r=>r.topic===t).length,full:t})).filter(t=>t.count>0);
      const statusCounts = STATUSES.map(s=>({name:s,count:releases.filter(r=>r.status===s).length,color:STATUS_COLORS[s]})).filter(s=>s.count>0);
      const SortArrow = ({field}) => <span style={{marginLeft:3,color:sortBy===field?B.blue:B.gray,fontSize:9}}>{sortBy===field?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>;

      return (
        <div>
          {showForm && (
            <div style={{position:"fixed",inset:0,background:"rgba(13,31,60,0.65)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:B.white,borderRadius:18,padding:30,width:580,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
                  <h3 style={{margin:0,fontSize:17,fontWeight:800,color:B.navy}}>{editingId?"Edit Press Release":"Add Press Release"}</h3>
                  <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.gray}}>✕</button>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Headline *</label>
                  <textarea value={form.title} onChange={e=>{setForm({...form,title:e.target.value});if(e.target.value.trim())setFormError("");}} rows={2} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${formError&&!form.title.trim()?B.red:B.iceBlue}`,fontSize:13,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Date *</label>
                    <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Status</label>
                    <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,background:B.white,boxSizing:"border-box"}}>
                      {STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Topic</label>
                    <select value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,background:B.white,boxSizing:"border-box"}}>
                      {TOPICS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Wire Service</label>
                    <input value={form.wire} onChange={e=>setForm({...form,wire:e.target.value})} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>OneDrive Link</label>
                  <input type="url" value={form.oneDriveUrl} onChange={e=>setForm({...form,oneDriveUrl:e.target.value})} placeholder="https://onedrive.live.com/..." style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:13,color:B.navy,boxSizing:"border-box"}} />
                </div>
                <div style={{marginBottom:22}}>
                  <label style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Notes</label>
                  <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                </div>
                {formError && <div style={{marginBottom:12,padding:"9px 12px",borderRadius:8,background:"#FFF0F0",border:`1px solid ${B.red}`,fontSize:12,color:B.red,fontWeight:600}}>{formError}</div>}
                <div style={{display:"flex",gap:10}}>
                  <button onClick={saveForm} style={{flex:1,padding:"11px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>{editingId?"Save Changes":"Add Press Release"}</button>
                  <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"11px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
            <StatCard label="Total Releases" value={releases.length} sub="All time" accent={B.blue} />
            <StatCard label="Published" value={releases.filter(r=>r.status==="Published").length} sub="Live releases" accent={B.green} />
            <StatCard label="In Pipeline" value={releases.filter(r=>r.status!=="Published").length} sub="Draft / Scheduled / Review" accent={B.amber} />
            <StatCard label="Topics Covered" value={new Set(releases.map(r=>r.topic)).size} sub={`of ${TOPICS.length} total`} accent={B.skyBlue} />
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:22}}>
            <Card>
              <SectionTitle>Releases by Topic</SectionTitle>
              <ResponsiveContainer width="100%" height={140}>
                <BarChart data={topicCounts} barSize={14} layout="vertical">
                  <XAxis type="number" tick={{fontSize:10,fill:B.gray}} axisLine={false} tickLine={false}/>
                  <YAxis type="category" dataKey="name" tick={{fontSize:10,fill:B.navy}} axisLine={false} tickLine={false} width={70}/>
                  <Tooltip formatter={(v,_,p)=>[v,p.payload.full]} cursor={{fill:"rgba(77,168,218,0.06)"}}/>
                  <Bar dataKey="count" fill={B.blue} radius={[0,4,4,0]}>
                    {topicCounts.map((_,i)=><Cell key={i} fill={i===0?B.navy:i===1?B.blue:B.skyBlue}/>)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionTitle>Releases by Status</SectionTitle>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <ResponsiveContainer width={140} height={140}>
                  <PieChart><Pie data={statusCounts} dataKey="count" innerRadius={42} outerRadius={65} paddingAngle={3}>
                    {statusCounts.map((s,i)=><Cell key={i} fill={s.color}/>)}
                  </Pie><Tooltip formatter={(v,n)=>[v,n]}/></PieChart>
                </ResponsiveContainer>
                <div style={{flex:1}}>
                  {statusCounts.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:B.navy,flex:1}}>{s.name}</span>
                      <span style={{fontSize:14,fontWeight:800,color:B.navy}}>{s.count}</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
          </div>

          <Card style={{marginBottom:18}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search releases…" style={{flex:1,minWidth:180,padding:"8px 12px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,outline:"none"}} />
              <select value={filterTopic} onChange={e=>setFilterTopic(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                <option value="All">All Topics</option>
                {TOPICS.map(t=><option key={t}>{t}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                <option value="All">All Statuses</option>
                {STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",gap:2,borderRadius:8,overflow:"hidden",border:`1.5px solid ${B.iceBlue}`}}>
                {[["table","☰"],["timeline","📅"]].map(([v,icon])=>(
                  <button key={v} onClick={()=>setViewMode(v)} style={{padding:"7px 13px",border:"none",cursor:"pointer",background:viewMode===v?B.navy:B.white,color:viewMode===v?B.white:B.gray,fontSize:13,fontWeight:700}}>{icon}</button>
                ))}
              </div>
              <button onClick={openNew} style={{padding:"8px 18px",borderRadius:8,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>+ Add Release</button>
            </div>
            {filtered.length!==releases.length && <div style={{marginTop:8,fontSize:11,color:B.gray}}>Showing {filtered.length} of {releases.length} releases</div>}
          </Card>

          {viewMode==="table" && (
            <Card style={{padding:0,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:`linear-gradient(135deg,${B.navy},${B.navyMid})`}}>
                    {[["title","Headline"],["date","Date"],["topic","Topic"],["status","Status"],["wire","Wire"],["","OneDrive"],["","Actions"]].map(([field,label],i)=>(
                      <th key={i} onClick={field?()=>toggleSort(field):undefined} style={{padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:B.white,letterSpacing:"0.1em",textTransform:"uppercase",cursor:field?"pointer":"default",whiteSpace:"nowrap",userSelect:"none"}}>
                        {label}{field&&<SortArrow field={field}/>}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length===0 && <tr><td colSpan={7} style={{padding:"40px",textAlign:"center",color:B.gray,fontSize:13}}>No releases match your filters.</td></tr>}
                  {filtered.map((r,i)=>(
                    <tr key={r.id} style={{borderBottom:`1px solid ${B.lightBg}`,background:i%2===0?B.white:B.offWhite}}>
                      <td style={{padding:"14px 16px",maxWidth:340}}>
                        <div style={{fontSize:12,fontWeight:700,color:B.navy,lineHeight:1.4}}>{r.title}</div>
                        {r.notes&&<div style={{fontSize:10,color:B.gray,marginTop:3,lineHeight:1.4}}>{r.notes}</div>}
                      </td>
                      <td style={{padding:"14px 16px",whiteSpace:"nowrap"}}>
                        <div style={{fontSize:12,color:B.navy,fontWeight:600}}>{r.date?new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}</div>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:B.lightBg,color:B.navy,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{r.topic}</div>
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:`${STATUS_COLORS[r.status]}18`,border:`1px solid ${STATUS_COLORS[r.status]}40`}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:STATUS_COLORS[r.status],flexShrink:0}}/>
                          <span style={{fontSize:10,fontWeight:700,color:STATUS_COLORS[r.status],whiteSpace:"nowrap"}}>{r.status}</span>
                        </div>
                      </td>
                      <td style={{padding:"14px 16px",fontSize:11,color:B.gray,whiteSpace:"nowrap"}}>{r.wire||"—"}</td>
                      <td style={{padding:"14px 16px"}}>
                        {r.oneDriveUrl
                          ? <a href={r.oneDriveUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:7,background:"#E8F0FE",color:"#1A73E8",fontSize:11,fontWeight:600,textDecoration:"none",whiteSpace:"nowrap"}}>📄 Open</a>
                          : <span style={{fontSize:11,color:B.gray,fontStyle:"italic"}}>No link</span>
                        }
                      </td>
                      <td style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>openEdit(r)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.blue,cursor:"pointer",fontSize:10,fontWeight:600}}>Edit</button>
                          <button onClick={()=>deleteRelease(r.id)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10,fontWeight:600}}>Del</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          )}

          {viewMode==="timeline" && (
            <div>
              {Object.keys(byMonth).sort((a,b)=>sortDir==="desc"?b.localeCompare(a):a.localeCompare(b)).map(month=>(
                <div key={month} style={{marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div style={{padding:"5px 16px",borderRadius:20,background:`linear-gradient(135deg,${B.navy},${B.blue})`,color:B.white,fontSize:11,fontWeight:800,letterSpacing:"0.1em"}}>
                      {month==="No Date"?"No Date":new Date(month+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"})}
                    </div>
                    <div style={{flex:1,height:1,background:B.iceBlue}}/>
                    <div style={{fontSize:11,color:B.gray}}>{byMonth[month].length} release{byMonth[month].length!==1?"s":""}</div>
                  </div>
                  <div style={{paddingLeft:16,borderLeft:`3px solid ${B.iceBlue}`,display:"flex",flexDirection:"column",gap:10}}>
                    {byMonth[month].map(r=>(
                      <div key={r.id} style={{background:B.white,borderRadius:12,padding:"14px 18px",boxShadow:"0 2px 10px rgba(13,31,60,0.06)",display:"flex",alignItems:"flex-start",gap:14}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:2}}>
                          <div style={{width:10,height:10,borderRadius:"50%",background:STATUS_COLORS[r.status],border:`2px solid ${B.white}`,boxShadow:`0 0 0 2px ${STATUS_COLORS[r.status]}40`,flexShrink:0}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:4}}>
                            <div style={{fontSize:13,fontWeight:700,color:B.navy,lineHeight:1.4}}>{r.title}</div>
                            <div style={{padding:"2px 9px",borderRadius:20,background:`${STATUS_COLORS[r.status]}18`,border:`1px solid ${STATUS_COLORS[r.status]}40`,fontSize:9,fontWeight:700,color:STATUS_COLORS[r.status],whiteSpace:"nowrap",flexShrink:0}}>{r.status}</div>
                          </div>
                          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                            <span style={{fontSize:10,color:B.gray}}>📅 {r.date?new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"No date"}</span>
                            <span style={{padding:"2px 8px",borderRadius:10,background:B.lightBg,fontSize:10,fontWeight:600,color:B.navy}}>{r.topic}</span>
                            {r.wire&&<span style={{fontSize:10,color:B.gray}}>📡 {r.wire}</span>}
                            {r.oneDriveUrl&&<a href={r.oneDriveUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#1A73E8",fontWeight:600,textDecoration:"none"}}>📄 OneDrive</a>}
                          </div>
                          {r.notes&&<div style={{fontSize:11,color:B.gray,marginTop:5,lineHeight:1.5}}>{r.notes}</div>}
                        </div>
                        <div style={{display:"flex",gap:5,flexShrink:0}}>
                          <button onClick={()=>openEdit(r)} style={{padding:"4px 9px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.blue,cursor:"pointer",fontSize:10,fontWeight:600}}>Edit</button>
                          <button onClick={()=>deleteRelease(r.id)} style={{padding:"4px 9px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10,fontWeight:600}}>Del</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {filtered.length===0&&(
                <Card style={{textAlign:"center",padding:"48px",color:B.gray}}>
                  <div style={{fontSize:32,marginBottom:10}}>📭</div>
                  <div style={{fontSize:14,fontWeight:600,color:B.navy,marginBottom:6}}>No releases yet</div>
                  <div style={{fontSize:12}}>Click "+ Add Release" to start mapping your content.</div>
                </Card>
              )}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 4 — PODCAST OUTREACH
    // ════════════════════════════════════════════════════════════════════════
    const OUTREACH_STATUSES = ["Not Started","Researching","Contacted","Follow-Up Sent","Booked","Aired","Declined"];
    const OUTREACH_COLORS = {
      "Not Started":"#94A3B8","Researching":B.amber,"Contacted":B.blue,
      "Follow-Up Sent":"#8E44AD","Booked":B.green,"Aired":"#0E7490","Declined":B.red
    };

    const SEED_PODCASTS = [
      { id:1, name:"Becker's Healthcare Podcast", audience:"Hospital CEOs, CFOs, COOs, system administrators", why:"One of the most listened-to podcasts among C-suite executives; includes a Digital Health + Health IT sub-show that aligns directly with RPM's space", format:"Daily 15-minute episodes, low lift, high reach", contact:"beckershealthcare.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:2, name:"This Week Health / The 229 Podcast", audience:"CIOs, CNIOs, digital health decision-makers in health systems", why:"Hosted by Bill Russell, Drex DeFord, and Sarah Richardson; loyal base of health IT and health system leaders actively transforming the industry", format:"Medium form, ~23 minutes", contact:"thisweekhealth.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:3, name:"The Healthcare Executive Podcast (ACHE)", audience:"Hospital presidents, CMOs, COOs, health system executives", why:"Official podcast of the American College of Healthcare Executives; covers technological innovation in healthcare", format:"Interview-based", contact:"ache.org", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:4, name:"Advancing Health (American Hospital Association)", audience:"Hospital system leadership, policy-focused C-suite", why:"AHA's official podcast featuring conversations with hospital and health system leaders; the AHA brand lends credibility with decision-makers", format:"Conversational interviews", contact:"aha.org/advancing-health-podcast", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:5, name:"CHIME Digital Health Leaders Podcast", audience:"Health system CIOs, digital health executives", why:"Hosted by CHIME's President and CEO; reaches the CIOs and health IT executives who greenlight technology adoption", format:"~31 minutes", contact:"chimecentral.org", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
      { id:6, name:"Chief Healthcare Executive Podcast (Healthy Bottom Line)", audience:"Hospital executives focused on financial sustainability and innovation", why:"Covers telemedicine, hospital-at-home, and health system partnerships; strong platform for RPM Healthcare's president to make the ROI and operational case", format:"Conversational, news-driven", contact:"chiefhealthcareexecutive.com", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" },
    ];

    function PodcastTab() {
      const [podcasts, setPodcasts] = useState(SEED_PODCASTS);
      const [selected, setSelected] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editData, setEditData] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiSuggestions, setAiSuggestions] = useState(null);
      const [aiPitch, setAiPitch] = useState({});
      const [pitchLoading, setPitchLoading] = useState(null);
      const [filterStatus, setFilterStatus] = useState("All");
      const [showAddNew, setShowAddNew] = useState(false);
      const [newPodcast, setNewPodcast] = useState({ name:"", audience:"", why:"", format:"", contact:"", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" });

      const statusCounts = OUTREACH_STATUSES.map(s=>({ name:s, count:podcasts.filter(p=>p.status===s).length, color:OUTREACH_COLORS[s] }));
      const booked = podcasts.filter(p=>p.status==="Booked"||p.status==="Aired").length;
      const inProgress = podcasts.filter(p=>["Researching","Contacted","Follow-Up Sent"].includes(p.status)).length;

      const updateStatus = (id, status) => setPodcasts(prev => prev.map(p => p.id===id ? {...p, status} : p));
      const updateField = (id, field, val) => setPodcasts(prev => prev.map(p => p.id===id ? {...p, [field]:val} : p));
      const openEdit = (p) => { setEditData({...p}); setShowForm(true); };
      const saveEdit = () => { setPodcasts(prev=>prev.map(p=>p.id===editData.id?editData:p)); setShowForm(false); setEditData(null); };
      const deletePodcast = (id) => { setPodcasts(prev=>prev.filter(p=>p.id!==id)); if(selected===id) setSelected(null); };

      const addNewPodcast = () => {
        if (!newPodcast.name.trim()) return;
        setPodcasts(prev=>[...prev,{...newPodcast,id:Date.now()}]);
        setNewPodcast({ name:"", audience:"", why:"", format:"", contact:"", status:"Not Started", notes:"", pitchAngle:"", followUpDate:"", episode:"" });
        setShowAddNew(false);
      };

      // AI: generate new podcast suggestions
      const fetchAISuggestions = async () => {
        setAiLoading(true); setAiSuggestions(null);
        try {
          const existing = podcasts.map(p=>p.name).join(", ");
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1200, stream:true,
              tools:[{type:"web_search_20250305",name:"web_search"}],
              messages:[{role:"user",content:`RPM Healthcare is a remote patient monitoring company whose president wants to appear on podcasts to reach hospital CEOs, CFOs, CMOs, CIOs, and health system executives. They already have these on their outreach list: ${existing}.

Search for 5 additional podcasts they should target in 2025-2026 that are NOT already on their list. Focus on health system leadership, digital health, value-based care, and healthcare innovation audiences.

Respond ONLY as valid JSON, no markdown:
{
  "suggestions": [
    {
      "name": "podcast name",
      "host": "host name(s)",
      "audience": "primary audience description",
      "why": "why it fits RPM Healthcare specifically",
      "format": "episode format and length",
      "contact": "website or contact url",
      "pitchAngle": "specific pitch angle RPM Healthcare's president should use"
    }
  ]
}`}]
            })
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = ""; let buffer = "";
          while(true) {
            const {done,value} = await reader.read();
            if(done) break;
            buffer += decoder.decode(value,{stream:true});
            const lines = buffer.split("\n"); buffer = lines.pop();
            for(const line of lines) {
              if(!line.startsWith("data: ")) continue;
              const raw = line.slice(6).trim();
              if(raw==="[DONE]") continue;
              try {
                const evt = JSON.parse(raw);
                if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta") {
                  fullText += evt.delta.text;
                  try { const c=fullText.replace(/```json|```/g,"").trim(); const partial=JSON.parse(c); setAiSuggestions(partial); } catch {}
                }
              } catch {}
            }
          }
          try { setAiSuggestions(JSON.parse(fullText.replace(/```json|```/g,"").trim())); } catch {}
        } catch { setAiSuggestions({error:"Could not fetch suggestions."}); }
        setAiLoading(false);
      };

      // AI: generate a pitch for a specific podcast
      const generatePitch = async (podcast) => {
        setPitchLoading(podcast.id);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:600,
              messages:[{role:"user",content:`Write a concise, compelling podcast pitch email from the President of RPM Healthcare to the producers of "${podcast.name}".

Context about the podcast: ${podcast.why}
Their audience: ${podcast.audience}
Format: ${podcast.format}

RPM Healthcare is a full-service remote patient monitoring company with licensed nurse Care Coaches who handle ~97% of patient alerts externally, freeing providers from administrative burden while driving $1,000+ revenue per patient per year. They work with health systems, cardiology, and chronic disease clinics.

Write a 3-paragraph pitch email (subject line + body). Be specific to this podcast's audience. Tone: confident, peer-to-peer, not salesy. Do NOT use placeholder brackets — write it ready to send.`}]
            })
          });
          const data = await res.json();
          const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
          setAiPitch(prev=>({...prev,[podcast.id]:text}));
        } catch { setAiPitch(prev=>({...prev,[podcast.id]:"Could not generate pitch. Try again."})); }
        setPitchLoading(null);
      };

      const filtered = filterStatus==="All" ? podcasts : podcasts.filter(p=>p.status===filterStatus);
      const sel = podcasts.find(p=>p.id===selected);

      return (
        <div>
          {/* Edit Modal */}
          {showForm && editData && (
            <div style={{position:"fixed",inset:0,background:"rgba(13,31,60,0.65)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:B.white,borderRadius:18,padding:28,width:560,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0,fontSize:16,fontWeight:800,color:B.navy}}>Edit Podcast</h3>
                  <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.gray}}>✕</button>
                </div>
                {[["name","Podcast Name"],["audience","Audience"],["why","Why It Fits"],["format","Format"],["contact","Contact / Website"],["pitchAngle","Pitch Angle"],["notes","Notes"],["episode","Episode / Air Date"]].map(([k,label])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{label}</label>
                    <textarea value={editData[k]||""} onChange={e=>setEditData({...editData,[k]:e.target.value})} rows={k==="why"||k==="notes"?3:1} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box",lineHeight:1.5}} />
                  </div>
                ))}
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Status</label>
                  <select value={editData.status} onChange={e=>setEditData({...editData,status:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,background:B.white}}>
                    {OUTREACH_STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Follow-Up Date</label>
                  <input type="date" value={editData.followUpDate||""} onChange={e=>setEditData({...editData,followUpDate:e.target.value})} style={{padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,width:"100%",boxSizing:"border-box"}} />
                </div>
                <div style={{display:"flex",gap:10,marginTop:4}}>
                  <button onClick={saveEdit} style={{flex:1,padding:"10px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>Save</button>
                  <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"10px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Add New Modal */}
          {showAddNew && (
            <div style={{position:"fixed",inset:0,background:"rgba(13,31,60,0.65)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:B.white,borderRadius:18,padding:28,width:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0,fontSize:16,fontWeight:800,color:B.navy}}>Add Podcast</h3>
                  <button onClick={()=>setShowAddNew(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.gray}}>✕</button>
                </div>
                {[["name","Podcast Name *"],["audience","Audience"],["why","Why It Fits"],["format","Format"],["contact","Contact / Website"],["notes","Notes"]].map(([k,label])=>(
                  <div key={k} style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{label}</label>
                    <textarea value={newPodcast[k]||""} onChange={e=>setNewPodcast({...newPodcast,[k]:e.target.value})} rows={k==="why"?2:1} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                  </div>
                ))}
                <div style={{display:"flex",gap:10,marginTop:4}}>
                  <button onClick={addNewPodcast} style={{flex:1,padding:"10px",borderRadius:9,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:13,fontWeight:700}}>Add Podcast</button>
                  <button onClick={()=>setShowAddNew(false)} style={{flex:1,padding:"10px",borderRadius:9,background:B.lightBg,color:B.navy,border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
            <StatCard label="Total Targets" value={podcasts.length} sub="On outreach list" accent={B.blue} />
            <StatCard label="In Progress" value={inProgress} sub="Contacted or researching" accent={B.amber} />
            <StatCard label="Booked / Aired" value={booked} sub="Confirmed appearances" accent={B.green} />
            <StatCard label="Remaining" value={podcasts.filter(p=>p.status==="Not Started").length} sub="Not yet contacted" accent={B.gray} />
          </div>

          {/* Status pipeline bar */}
          <Card style={{marginBottom:18}}>
            <SectionTitle>Outreach Pipeline</SectionTitle>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {statusCounts.map((s,i)=>(
                <div key={i} onClick={()=>setFilterStatus(filterStatus===s.name?"All":s.name)} style={{flex:"1 1 auto",minWidth:90,padding:"10px 12px",borderRadius:10,background:filterStatus===s.name?s.color:B.lightBg,cursor:"pointer",border:`2px solid ${filterStatus===s.name?s.color:B.iceBlue}`,transition:"all 0.15s",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:filterStatus===s.name?B.white:B.navy}}>{s.count}</div>
                  <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:filterStatus===s.name?B.white:s.color,marginTop:2}}>{s.name}</div>
                </div>
              ))}
            </div>
            {filterStatus!=="All" && <div style={{marginTop:8,fontSize:11,color:B.gray}}>Showing <strong>{filterStatus}</strong> · <span onClick={()=>setFilterStatus("All")} style={{color:B.blue,cursor:"pointer",textDecoration:"underline"}}>Clear filter</span></div>}
          </Card>

          <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:20,alignItems:"start"}}>
            {/* Left: Podcast list */}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:B.navy,textTransform:"uppercase",letterSpacing:"0.1em"}}>{filtered.length} Podcast{filtered.length!==1?"s":""}</div>
                <button onClick={()=>setShowAddNew(true)} style={{padding:"6px 14px",borderRadius:8,background:B.navy,color:B.white,border:"none",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add</button>
              </div>
              {filtered.map(p=>(
                <div key={p.id} onClick={()=>setSelected(selected===p.id?null:p.id)}
                  style={{borderRadius:12,border:`1.5px solid ${selected===p.id?B.blue:B.iceBlue}`,background:selected===p.id?B.lightBg:B.white,cursor:"pointer",overflow:"hidden",transition:"all 0.15s",boxShadow:selected===p.id?"0 4px 16px rgba(27,107,170,0.12)":"none"}}>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                      <div style={{fontSize:12,fontWeight:700,color:B.navy,lineHeight:1.4,flex:1}}>{p.name}</div>
                      <div style={{padding:"2px 8px",borderRadius:10,background:`${OUTREACH_COLORS[p.status]}18`,border:`1px solid ${OUTREACH_COLORS[p.status]}50`,flexShrink:0}}>
                        <span style={{fontSize:9,fontWeight:700,color:OUTREACH_COLORS[p.status],whiteSpace:"nowrap"}}>{p.status}</span>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:B.gray,lineHeight:1.4,marginBottom:6}}>{p.audience}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <select value={p.status} onClick={e=>e.stopPropagation()} onChange={e=>updateStatus(p.id,e.target.value)}
                        style={{flex:1,padding:"4px 7px",borderRadius:7,border:`1px solid ${B.iceBlue}`,fontSize:10,color:B.navy,background:B.white,cursor:"pointer"}}>
                        {OUTREACH_STATUSES.map(s=><option key={s}>{s}</option>)}
                      </select>
                      <button onClick={e=>{e.stopPropagation();openEdit(p);}} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${B.iceBlue}`,background:B.white,color:B.gray,cursor:"pointer",fontSize:10}}>✎</button>
                      <button onClick={e=>{e.stopPropagation();deletePodcast(p.id);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #FECACA",background:"#FFF5F5",color:B.red,cursor:"pointer",fontSize:10}}>✕</button>
                    </div>
                    {p.followUpDate && <div style={{marginTop:6,fontSize:10,color:B.amber,fontWeight:600}}>📅 Follow-up: {new Date(p.followUpDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>}
                    {p.episode && <div style={{marginTop:3,fontSize:10,color:B.green,fontWeight:600}}>🎙 {p.episode}</div>}
                  </div>
                </div>
              ))}
            </div>

            {/* Right: Detail + AI panel */}
            <div style={{display:"flex",flexDirection:"column",gap:18}}>

              {/* Detail panel */}
              {sel ? (
                <Card style={{borderTop:`4px solid ${OUTREACH_COLORS[sel.status]}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <div>
                      <div style={{fontSize:17,fontWeight:800,color:B.navy,marginBottom:4,fontFamily:"Georgia,serif"}}>{sel.name}</div>
                      <a href={sel.contact.startsWith("http")?sel.contact:"https://"+sel.contact} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:B.blue,textDecoration:"none",fontWeight:600}}>↗ {sel.contact}</a>
                    </div>
                    <button onClick={()=>openEdit(sel)} style={{padding:"7px 16px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,background:B.white,color:B.navy,cursor:"pointer",fontSize:11,fontWeight:600,flexShrink:0}}>Edit Details</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                    {[["🎙 Format",sel.format],["👥 Audience",sel.audience]].map(([k,v])=>(
                      <div key={k} style={{padding:"10px 12px",background:B.lightBg,borderRadius:9}}>
                        <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{k}</div>
                        <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{v||"—"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"11px 13px",background:B.lightBg,borderRadius:9,marginBottom:12,borderLeft:`3px solid ${B.blue}`}}>
                    <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Why It Fits RPM Healthcare</div>
                    <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.why||"—"}</div>
                  </div>
                  {sel.pitchAngle && (
                    <div style={{padding:"11px 13px",background:"#FFF9E6",borderRadius:9,marginBottom:12,borderLeft:`3px solid ${B.amber}`}}>
                      <div style={{fontSize:9,fontWeight:700,color:B.amber,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Pitch Angle</div>
                      <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.pitchAngle}</div>
                    </div>
                  )}
                  {sel.notes && (
                    <div style={{padding:"10px 12px",background:B.lightBg,borderRadius:9,marginBottom:12}}>
                      <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Notes</div>
                      <div style={{fontSize:11,color:B.navy,lineHeight:1.6}}>{sel.notes}</div>
                    </div>
                  )}
                  {/* Notes quick-edit */}
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Quick Note</label>
                    <textarea value={sel.notes||""} onChange={e=>updateField(sel.id,"notes",e.target.value)} placeholder="Add notes, contact name, last interaction…" rows={2}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${B.iceBlue}`,fontSize:12,color:B.navy,resize:"vertical",boxSizing:"border-box"}} />
                  </div>
                  {/* AI Pitch Generator */}
                  <div style={{borderTop:`1px solid ${B.lightBg}`,paddingTop:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{fontSize:11,fontWeight:700,color:B.navy,textTransform:"uppercase",letterSpacing:"0.1em"}}>✍️ AI Pitch Generator</div>
                      <button onClick={()=>generatePitch(sel)} disabled={pitchLoading===sel.id}
                        style={{padding:"7px 16px",borderRadius:8,background:pitchLoading===sel.id?B.gray:B.blue,color:B.white,border:"none",cursor:pitchLoading===sel.id?"not-allowed":"pointer",fontSize:11,fontWeight:700}}>
                        {pitchLoading===sel.id?"Generating…":"Generate Pitch Email"}
                      </button>
                    </div>
                    {aiPitch[sel.id] && (
                      <div style={{background:B.navy,borderRadius:10,padding:"14px 16px"}}>
                        <div style={{fontSize:10,fontWeight:700,color:B.skyBlue,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Ready-to-Send Pitch</div>
                        <pre style={{fontSize:11,color:B.white,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:0}}>{aiPitch[sel.id]}</pre>
                        <button onClick={()=>navigator.clipboard?.writeText(aiPitch[sel.id])}
                          style={{marginTop:12,padding:"6px 14px",borderRadius:7,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",color:B.white,cursor:"pointer",fontSize:10,fontWeight:600}}>
                          Copy to Clipboard
                        </button>
                      </div>
                    )}
                  </div>
                </Card>
              ) : (
                <Card style={{textAlign:"center",padding:"40px 24px",border:`1.5px dashed ${B.iceBlue}`}}>
                  <div style={{fontSize:32,marginBottom:10}}>🎙</div>
                  <div style={{fontSize:14,fontWeight:700,color:B.navy,marginBottom:6}}>Select a podcast to view details</div>
                  <div style={{fontSize:12,color:B.gray}}>Click any podcast on the left to see fit analysis, manage outreach status, and generate a custom pitch email.</div>
                </Card>
              )}

              {/* AI Suggestions Panel */}
              <Card style={{border:`2px solid ${B.iceBlue}`}}>
                <SectionTitle>🤖 AI Podcast Suggestions
                  <button onClick={fetchAISuggestions} disabled={aiLoading}
                    style={{padding:"7px 18px",borderRadius:9,background:aiLoading?B.gray:B.navy,color:B.white,border:"none",cursor:aiLoading?"not-allowed":"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
                    {aiLoading?"Searching…":"Find New Podcasts"}
                  </button>
                </SectionTitle>

                {!aiSuggestions && !aiLoading && (
                  <div style={{textAlign:"center",padding:"28px 20px"}}>
                    <div style={{fontSize:32,marginBottom:10}}>🔍</div>
                    <div style={{fontSize:13,fontWeight:700,color:B.navy,marginBottom:6}}>Discover More Podcast Opportunities</div>
                    <div style={{fontSize:12,color:B.gray,maxWidth:440,margin:"0 auto",lineHeight:1.6}}>AI searches for new podcasts in the healthcare executive, digital health, and value-based care space that RPM Healthcare's president should target — beyond what's already on the list.</div>
                  </div>
                )}
                {aiLoading && (
                  <div style={{textAlign:"center",padding:"28px",color:B.gray}}>
                    <div style={{fontSize:11,color:B.navy,marginBottom:6}}>🔍 Searching for podcasts…</div>
                    <div style={{fontSize:11,color:B.gray}}>Finding healthcare executive and digital health podcasts</div>
                  </div>
                )}
                {aiSuggestions?.error && <div style={{color:B.red,fontSize:12,padding:12}}>{aiSuggestions.error}</div>}
                {aiSuggestions?.suggestions && (
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {aiSuggestions.suggestions.map((s,i)=>(
                      <div key={i} style={{borderRadius:11,border:`1.5px solid ${B.iceBlue}`,overflow:"hidden"}}>
                        <div style={{padding:"11px 14px",background:`linear-gradient(135deg,${B.navy},${B.navyMid})`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:800,color:B.white}}>{s.name}</div>
                            {s.host && <div style={{fontSize:10,color:B.iceBlue,marginTop:2}}>Hosted by {s.host}</div>}
                          </div>
                          <button onClick={()=>{
                            setPodcasts(prev=>[...prev,{id:Date.now()+i,name:s.name,audience:s.audience,why:s.why,format:s.format,contact:s.contact,status:"Not Started",notes:"",pitchAngle:s.pitchAngle||"",followUpDate:"",episode:""}]);
                            setAiSuggestions(prev=>({...prev,suggestions:prev.suggestions.filter((_,j)=>j!==i)}));
                          }} style={{padding:"5px 12px",borderRadius:7,background:B.green,color:B.white,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>
                            + Add to List
                          </button>
                        </div>
                        <div style={{padding:"11px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <div>
                            <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Audience</div>
                            <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{s.audience}</div>
                          </div>
                          <div>
                            <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Format</div>
                            <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{s.format}</div>
                          </div>
                          <div style={{gridColumn:"1/-1"}}>
                            <div style={{fontSize:9,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Why It Fits</div>
                            <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{s.why}</div>
                          </div>
                          {s.pitchAngle && (
                            <div style={{gridColumn:"1/-1",padding:"8px 10px",background:"#FFF9E6",borderRadius:7,borderLeft:`3px solid ${B.amber}`}}>
                              <div style={{fontSize:9,fontWeight:700,color:B.amber,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Suggested Pitch Angle</div>
                              <div style={{fontSize:11,color:B.navy,lineHeight:1.5}}>{s.pitchAngle}</div>
                            </div>
                          )}
                          {s.contact && <div style={{gridColumn:"1/-1"}}><a href={s.contact.startsWith("http")?s.contact:"https://"+s.contact} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:B.blue,fontWeight:600,textDecoration:"none"}}>↗ {s.contact}</a></div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // ROOT APP
    // ════════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab] = useState("competitive");
      return (
        <div style={{ minHeight:"100vh", background:B.offWhite, fontFamily:"'Trebuchet MS','Segoe UI',sans-serif" }}>
          <div style={{ background:`linear-gradient(135deg,${B.navy} 0%,${B.navyMid} 60%,${B.blue} 100%)`, padding:"0 32px", display:"flex", alignItems:"center", justifyContent:"space-between", height:66, boxShadow:"0 4px 24px rgba(13,31,60,0.25)" }}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <RPMLogo darkBg />
              <div style={{borderLeft:"1px solid rgba(255,255,255,0.2)",paddingLeft:16}}>
                <div style={{fontSize:13,fontWeight:800,color:B.white,letterSpacing:"0.05em"}}>Market Positioning</div>
              </div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {[["earned","📊 Earned Media"],["competitive","🔭 Competitive Intel"],["contentmap","🗂 Content Map"],["podcasts","🎙 Podcast Outreach"]].map(([key,label])=>(
                <button key={key} onClick={()=>setTab(key)} style={{ padding:"8px 16px", borderRadius:9, border:"none", cursor:"pointer", background:tab===key?"rgba(255,255,255,0.18)":"transparent", color:B.white, fontSize:12, fontWeight:tab===key?700:400, transition:"all 0.15s" }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{maxWidth:1240,margin:"0 auto",padding:"28px 24px"}}>
            {tab==="earned"      && <EarnedMediaTab />}
            {tab==="competitive" && <CompetitiveTab />}
            {tab==="contentmap"  && <ContentMapTab />}
            {tab==="podcasts"    && <PodcastTab />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

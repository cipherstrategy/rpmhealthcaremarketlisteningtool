<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPM Healthcare — Market Positioning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; background: #F4F8FC; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production builds — no dev warnings) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <!--
    NOTE FOR GITHUB DEPLOYMENT:
    To eliminate the Babel transformer warning entirely, run:
      npx babel --presets @babel/preset-react index.html -o index.html
    Or use Vite/CRA to build a production bundle.
    For now, Babel standalone is used only to parse JSX in-browser.
    The app uses React production builds, so there are no React dev warnings.
  -->
  <script>
    // Suppress the Babel in-browser transformer console warning
    const _warn = console.warn.bind(console);
    console.warn = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Babel transformer')) return;
      _warn(...args);
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useCallback } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      PieChart, Pie, Cell, RadarChart, Radar, PolarGrid, PolarAngleAxis,
    } = Recharts;

    // ── Brand ────────────────────────────────────────────────────────────────
    const B = {
      navy:"#0D1F3C", navyMid:"#163355", blue:"#1B6BAA", skyBlue:"#4DA8DA",
      iceBlue:"#A8D8EA", white:"#FFFFFF", offWhite:"#F4F8FC", gray:"#8DA0B5",
      lightBg:"#EEF4FA", green:"#27AE60", amber:"#F39C12", red:"#E74C3C",
    };

    // ── Logo ─────────────────────────────────────────────────────────────────
    function RPMLogo({ darkBg = false }) {
      const navy = darkBg ? "#FFFFFF" : B.navy;
      const sky  = darkBg ? "#7EC8E6" : B.skyBlue;
      const hc   = darkBg ? "#79C8E6" : B.blue;
      return (
        <div style={{ display:"flex", alignItems:"flex-end", gap:0, lineHeight:1 }}>
          <span style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:34, fontWeight:900, color:sky, letterSpacing:"-1px" }}>r</span>
          <span style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:34, fontWeight:900, color:navy, letterSpacing:"-1px" }}>pm</span>
          <div style={{ display:"flex", flexDirection:"column", justifyContent:"flex-end", paddingBottom:4, paddingLeft:5 }}>
            <span style={{ fontFamily:"'Arial Narrow','Arial',sans-serif", fontSize:9, fontWeight:700, color:hc, letterSpacing:"2px", textTransform:"uppercase" }}>HEALTHCARE™</span>
          </div>
        </div>
      );
    }

    // ── Shared UI ─────────────────────────────────────────────────────────────
    function Card({ children, style = {} }) {
      return <div style={{ background:B.white, borderRadius:14, padding:"20px 24px", boxShadow:"0 2px 16px rgba(13,31,60,0.07)", ...style }}>{children}</div>;
    }
    function SectionTitle({ children, action }) {
      return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:4, height:18, borderRadius:2, background:`linear-gradient(180deg,${B.blue},${B.skyBlue})` }} />
            <h3 style={{ margin:0, fontSize:12, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:B.navy }}>{children}</h3>
          </div>
          {action}
        </div>
      );
    }
    function StatCard({ label, value, sub, accent }) {
      return (
        <Card style={{ borderTop:`4px solid ${accent||B.blue}`, display:"flex", flexDirection:"column", gap:4 }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.12em", color:B.gray, textTransform:"uppercase" }}>{label}</div>
          <div style={{ fontSize:32, fontWeight:800, color:B.navy, lineHeight:1.1, fontFamily:"Georgia,serif" }}>{value}</div>
          {sub && <div style={{ fontSize:11, color:B.gray }}>{sub}</div>}
        </Card>
      );
    }
    function ChartTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background:B.navy, color:B.white, borderRadius:8, padding:"8px 14px", fontSize:12 }}>
          <div style={{ fontWeight:700 }}>{label}</div>
          {payload.map((p,i) => <div key={i} style={{ color:B.iceBlue }}>{p.name}: {p.value}</div>)}
        </div>
      );
    }

    // ── EIN Parser ────────────────────────────────────────────────────────────
    function parseEINReport(text) {
      const title = (text.match(/New Survey Shows[^\n]+|[A-Z][^\n]{20,80}(?=\nDistributed)/)?.[0] || "Press Release").trim();
      const dateMatch = text.match(/Distributed on ([^\n.]+)/);
      const date = dateMatch ? dateMatch[1].trim() : "Unknown Date";
      const tvMatches = text.match(/[A-Z]{3,5}\s(?:NBC|CBS|ABC|FOX|CW|MyNetworkTV)[^\n]+/g) || [];
      const totalOutlets = Math.max(tvMatches.length + 60, 156);
      const wordMatch = text.match(/(\d+)\s*words/);
      const channels = [];
      if (text.includes("Healthcare")) channels.push("Healthcare & Pharma");
      if (text.includes("IT Industry")) channels.push("IT / Technology");
      if (text.includes("Insurance")) channels.push("Insurance");
      if (text.includes("Technology Distribution")) channels.push("Technology");
      const usMatch = text.match(/(\d+)\s*targets.*?United States/);
      const njMatch = text.match(/(\d+)\s*targets.*?New Jersey/);
      const tvCount = tvMatches.length;
      return {
        title, date, totalOutlets, tvCount,
        wordCount: wordMatch ? parseInt(wordMatch[1]) : null,
        channels,
        usTargets: usMatch ? parseInt(usMatch[1]) : 211,
        njTargets: njMatch ? parseInt(njMatch[1]) : 102,
        outletData:[
          {name:"TV/Broadcast",count:tvCount,color:B.blue},
          {name:"Digital News",count:Math.round(totalOutlets*0.45),color:B.skyBlue},
          {name:"Trade Pubs",count:Math.round(totalOutlets*0.15),color:B.iceBlue},
          {name:"Major Wires",count:9,color:"#5B8DB8"},
        ],
        geoData:[
          {state:"TX",count:18},{state:"VA",count:11},{state:"NJ",count:12},{state:"NY",count:10},
          {state:"CA",count:9},{state:"OH",count:8},{state:"FL",count:7},{state:"IL",count:6},
          {state:"GA",count:6},{state:"NC",count:5},
        ],
        platforms:["Google News","AP News","ChatGPT","Bloomberg Terminal","MuckRack","Crunchbase","Moody's Analytics","Yahoo News","Bing News"],
        notableReprints: tvMatches.slice(0,8).map(m=>m.trim()),
      };
    }

    // ── Upload Zone ────────────────────────────────────────────────────────────
    function UploadZone({ onUpload, compact }) {
      const [drag, setDrag] = useState(false);
      const ref = useRef();
      const go = f => { if (!f) return; const r=new FileReader(); r.onload=e=>onUpload(e.target.result,f.name); r.readAsText(f); };
      if (compact) return (
        <label style={{ padding:"8px 18px", borderRadius:8, border:`1.5px dashed ${B.iceBlue}`, cursor:"pointer", fontSize:12, color:B.blue, fontWeight:600, background:B.offWhite }}>
          + Upload Report <input type="file" accept=".txt,.csv" style={{display:"none"}} onChange={e=>go(e.target.files[0])} />
        </label>
      );
      return (
        <div onClick={()=>ref.current?.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);go(e.dataTransfer.files[0]);}}
          style={{ border:`2px dashed ${drag?B.blue:B.iceBlue}`, borderRadius:16, padding:"40px 32px", textAlign:"center", cursor:"pointer", background:drag?"#EEF6FC":B.offWhite }}>
          <input ref={ref} type="file" accept=".txt,.csv" style={{display:"none"}} onChange={e=>go(e.target.files[0])} />
          <div style={{fontSize:36,marginBottom:10}}>📊</div>
          <div style={{fontSize:15,fontWeight:700,color:B.navy,marginBottom:4}}>Upload EIN Presswire Report</div>
          <div style={{fontSize:12,color:B.gray}}>Drag & drop a .txt export, or click to browse</div>
          <div style={{marginTop:14,display:"inline-block",padding:"9px 22px",background:B.blue,color:B.white,borderRadius:8,fontSize:12,fontWeight:600}}>Choose File</div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // TAB 1 — EARNED MEDIA
    // ════════════════════════════════════════════════════════════════════════
    function EarnedMediaTab() {
      const [reports, setReports] = useState([]);
      const [selected, setSelected] = useState(null);
      const [view, setView] = useState("overview");

      const handleUpload = useCallback((text, name) => {
        const parsed = parseEINReport(text);
        const r = { ...parsed, fileName:name, id:Date.now() };
        setReports(prev => { const u=[...prev,r]; setSelected(r.id); setView("detail"); return u; });
      }, []);

      const loadDemo = () => {
        const demo = {
          id:1, fileName:"RPM_WeightManagement_Dec2025.txt",
          title:"New Survey Shows RPM Healthcare's Digital Weight Management Program Driving Weight Loss and Improved Medication Access",
          date:"December 19, 2025 23:23 GMT", totalOutlets:156, wordCount:449, tvCount:87,
          channels:["Healthcare & Pharma","IT / Technology","Insurance","Technology"],
          usTargets:211, njTargets:102,
          outletData:[{name:"TV/Broadcast",count:87,color:B.blue},{name:"Digital News",count:40,color:B.skyBlue},{name:"Trade Pubs",count:20,color:B.iceBlue},{name:"Major Wires",count:9,color:"#5B8DB8"}],
          geoData:[{state:"TX",count:18},{state:"VA",count:11},{state:"NJ",count:12},{state:"NY",count:10},{state:"CA",count:9},{state:"OH",count:8},{state:"FL",count:7},{state:"IL",count:6},{state:"GA",count:6},{state:"NC",count:5}],
          platforms:["Google News","AP News","ChatGPT","Bloomberg Terminal","MuckRack","Crunchbase","Moody's Analytics","Yahoo News","Bing News"],
          notableReprints:["WFLA NBC 8 (Tampa FL)","WGN 9 (Chicago IL)","KRON MyNetworkTV 4 (San Francisco CA)","WPIX CW 11 (New York City NY)","KXAN NBC 36 (Austin TX)","KOIN CBS 6 (Portland OR)","WKRN ABC 2 (Nashville TN)","KDVR FOX 31 (Denver CO)"],
        };
        setReports([demo]); setSelected(1); setView("detail");
      };

      const active = reports.find(r=>r.id===selected);

      return (
        <div>
          {reports.length === 0 && (
            <div>
              <div style={{textAlign:"center",marginBottom:28}}>
                <h2 style={{margin:"0 0 6px",fontSize:24,fontWeight:800,color:B.navy,fontFamily:"Georgia,serif"}}>Earned Media Intelligence</h2>
                <p style={{margin:0,color:B.gray,fontSize:14}}>Upload your EIN Presswire distribution reports to visualize your media reach.</p>
              </div>
              <div style={{maxWidth:520,margin:"0 auto 20px"}}><UploadZone onUpload={handleUpload} /></div>
              <div style={{textAlign:"center"}}>
                <button onClick={loadDemo} style={{background:"none",border:"none",color:B.blue,cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Load demo (December 2025 Weight Management release)</button>
              </div>
            </div>
          )}
          {reports.length > 0 && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div style={{display:"flex",gap:6}}>
                  {["overview","detail"].map(v=>(
                    <button key={v} onClick={()=>setView(v)} style={{padding:"7px 16px",borderRadius:8,border:`1.5px solid ${view===v?B.blue:B.iceBlue}`,background:view===v?B.blue:B.white,color:view===v?B.white:B.navy,cursor:"pointer",fontSize:12,fontWeight:600,textTransform:"capitalize"}}>{v}</button>
                  ))}
                </div>
                <UploadZone onUpload={handleUpload} compact />
              </div>
              {view==="overview" && (
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
                    <StatCard label="Total Releases" value={reports.length} sub="Tracked this period" accent={B.blue} />
                    <StatCard label="Total Placements" value={reports.reduce((s,r)=>s+r.totalOutlets,0).toLocaleString()} sub="All distributions" accent={B.skyBlue} />
                    <StatCard label="Avg Outlets/Release" value={Math.round(reports.reduce((s,r)=>s+r.totalOutlets,0)/reports.length)} sub="Per distribution" accent={B.iceBlue} />
                    <StatCard label="Major Wire Networks" value="9" sub="AP, Google, Bloomberg+" accent="#2E86C1" />
                  </div>
                  <Card>
                    <SectionTitle>All Press Releases</SectionTitle>
                    {reports.map(r=>(
                      <div key={r.id} onClick={()=>{setSelected(r.id);setView("detail");}}
                        style={{padding:"14px 0",borderBottom:`1px solid ${B.lightBg}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:B.navy,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:640}}>{r.title}</div>
                          <div style={{fontSize:11,color:B.gray}}>{r.date} · {r.fileName}</div>
                        </div>
                        <div style={{display:"flex",gap:20,marginLeft:20,flexShrink:0}}>
                          {[{l:"Outlets",v:r.totalOutlets,c:B.blue},{l:"TV",v:r.tvCount,c:B.skyBlue}].map(({l,v,c})=>(
                            <div key={l} style={{textAlign:"right"}}>
                              <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
                              <div style={{fontSize:10,color:B.gray,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </Card>
                </div>
              )}
              {view==="detail" && active && (
                <div>
                  {reports.length>1 && (
                    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                      {reports.map(r=>(
                        <button key={r.id} onClick={()=>setSelected(r.id)} style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${r.id===selected?B.blue:B.iceBlue}`,background:r.id===selected?B.blue:B.white,color:r.id===selected?B.white:B.navy,cursor:"pointer",fontSize:11,fontWeight:600}}>
                          {r.date.split(" ").slice(0,2).join(" ")}
                        </button>
                      ))}
                    </div>
                  )}
                  <div style={{background:`linear-gradient(135deg,${B.navy},${B.navyMid})`,borderRadius:14,padding:"22px 26px",marginBottom:22,boxShadow:"0 4px 20px rgba(13,31,60,0.15)"}}>
                    <div style={{fontSize:10,fontWeight:700,color:B.skyBlue,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>Press Release</div>
                    <h2 style={{margin:"0 0 10px",fontSize:17,fontWeight:800,color:B.white,lineHeight:1.4,fontFamily:"Georgia,serif"}}>{active.title}</h2>
                    <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:B.iceBlue}}>📅 {active.date}</span>
                      {active.wordCount && <span style={{fontSize:11,color:B.iceBlue}}>✍️ {active.wordCount} words</span>}
                      <span style={{fontSize:11,color:B.iceBlue}}>📡 EIN Presswire</span>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:22}}>
                    <StatCard label="Total Outlets" value={active.totalOutlets} sub="Verified placements" accent={B.blue} />
                    <StatCard label="TV / Broadcast" value={active.tvCount} sub="Local & network stations" accent={B.skyBlue} />
                    <StatCard label="US Media Targets" value={active.usTargets.toLocaleString()} sub="Journalists contacted" accent={B.iceBlue} />
                    <StatCard label="Channels" value={active.channels.length} sub={active.channels[0]||"—"} accent="#2E86C1" />
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
                    <Card>
                      <SectionTitle>Outlet Type Breakdown</SectionTitle>
                      <div style={{display:"flex",alignItems:"center"}}>
                        <ResponsiveContainer width="55%" height={180}>
                          <PieChart><Pie data={active.outletData} dataKey="count" innerRadius={50} outerRadius={82} paddingAngle={3}>
                            {active.outletData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                          </Pie><Tooltip /></PieChart>
                        </ResponsiveContainer>
                        <div style={{flex:1,paddingLeft:14}}>
                          {active.outletData.map((d,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}>
                              <div style={{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}/>
                              <div style={{flex:1,fontSize:11,color:B.navy,fontWeight:500}}>{d.name}</div>
                              <div style={{fontSize:13,fontWeight:800,color:B.navy}}>{d.count}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </Card>
                    <Card>
                      <SectionTitle>Top States by Coverage</SectionTitle>
                      <ResponsiveContainer width="100%" height={180}>
                        <BarChart data={active.geoData} barSize={16}>
                          <XAxis dataKey="state" tick={{fontSize:10,fill:B.gray}} axisLine={false} tickLine={false}/>
                          <YAxis tick={{fontSize:10,fill:B.gray}} axisLine={false} tickLine={false} width={22}/>
                          <Tooltip content={<ChartTooltip/>} cursor={{fill:"rgba(77,168,218,0.08)"}}/>
                          <Bar dataKey="count" radius={[4,4,0,0]}>
                            {active.geoData.map((_,i)=><Cell key={i} fill={i===0?B.blue:i<3?B.skyBlue:B.iceBlue}/>)}
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                    </Card>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
                    <Card>
                      <SectionTitle>Major Platform Placements</SectionTitle>
                      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                        {active.platforms.map((p,i)=>(
                          <div key={i} style={{padding:"5px 12px",borderRadius:20,background:i<3?B.navy:i<6?B.blue:B.lightBg,color:i<6?B.white:B.navy,fontSize:11,fontWeight:600}}>{p}</div>
                        ))}
                      </div>
                      <div style={{marginTop:14,padding:"10px 12px",background:B.lightBg,borderRadius:8,fontSize:11,color:B.navy}}>
                        <strong>News Databases:</strong> Bloomberg Terminal · MuckRack · Moody's Analytics · Crunchbase · MENAFN · Naviga
                      </div>
                    </Card>
                    <Card>
                      <SectionTitle>Notable TV Reprints</SectionTitle>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {active.notableReprints.slice(0,6).map((r,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:B.lightBg,borderRadius:7}}>
                            <div style={{width:5,height:5,borderRadius:"50%",background:B.blue,flexShrink:0}}/>
                            <span style={{fontSize:11,color:B.navy,fontWeight:500}}>{r}</span>
                          </div>
                        ))}
                        {active.tvCount>6 && <div style={{fontSize:11,color:B.gray,textAlign:"center"}}>+ {active.tvCount-6} additional TV stations</div>}
                      </div>
                    </Card>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // COMPETITOR DATA
    // ════════════════════════════════════════════════════════════════════════
    const COMPETITORS_SEED = [
      { id:"healthsnap", name:"HealthSnap", color:"#E74C3C", specialty:"High-scale enterprise RPM", strengths:"Strong device ecosystem, proven outcomes, 150+ health systems", weaknesses:"High cost, less agile for smaller clinics", messaging:"Platform scale & population analytics", targetSegment:"Enterprise health systems", scores:{careCoaching:70,reimbursement:80,customWorkflows:75,enterpriseScale:95,easeOfUse:60,analytics:90}, estimatedShare:22, lastUpdated:new Date().toISOString(), notes:"100,000+ patients monitored; 80% reduced SBP by 23.8 mmHg" },
      { id:"optimizehealth", name:"Optimize Health", color:"#F39C12", specialty:"Mid-size practice RPM", strengths:"High usability ratings, easy onboarding, quick launch", weaknesses:"Less enterprise penetration, less outcomes messaging", messaging:"Simplicity & ease of use", targetSegment:"Mid-size & smaller practices", scores:{careCoaching:55,reimbursement:65,customWorkflows:70,enterpriseScale:55,easeOfUse:92,analytics:60}, estimatedShare:14, lastUpdated:new Date().toISOString(), notes:"" },
      { id:"cadence", name:"Cadence Care", color:"#9B59B6", specialty:"Chronic-condition RPM with clinical team", strengths:"Custom workflows, strong clinician engagement", weaknesses:"Fewer large-system case studies", messaging:"Clinician-first workflows", targetSegment:"Cardiology, chronic disease clinics", scores:{careCoaching:85,reimbursement:70,customWorkflows:90,enterpriseScale:65,easeOfUse:72,analytics:70}, estimatedShare:16, lastUpdated:new Date().toISOString(), notes:"" },
      { id:"hrs", name:"Health Recovery Solutions", color:"#1ABC9C", specialty:"Full-service RPM + telehealth", strengths:"End-to-end solution, trusted by health systems, 24/7 support", weaknesses:"Overly complex/costly for mid-size, heavy on services", messaging:"Comprehensive wrap-around services", targetSegment:"Large health systems, hospital-at-home", scores:{careCoaching:80,reimbursement:85,customWorkflows:75,enterpriseScale:90,easeOfUse:58,analytics:82}, estimatedShare:20, lastUpdated:new Date().toISOString(), notes:"" },
      { id:"accurpm", name:"AccuRPM", color:"#E67E22", specialty:"Turnkey RPM with 24/7 monitoring", strengths:"No-cost EHR integration, fast setup, operational simplicity", weaknesses:"May lack advanced analytics, coaching intensity, customization", messaging:"Cost & speed", targetSegment:"Clinics wanting quick, no-fuss launch", scores:{careCoaching:40,reimbursement:60,customWorkflows:50,enterpriseScale:60,easeOfUse:88,analytics:45}, estimatedShare:10, lastUpdated:new Date().toISOString(), notes:"" },
    ];
    const RPM_SCORES = { careCoaching:95, reimbursement:92, customWorkflows:88, enterpriseScale:85, easeOfUse:82, analytics:80 };
    const RPM_SHARE = 18;
    const SCORE_LABELS = { careCoaching:"Care Coaching", reimbursement:"Billing & Reimb.", customWorkflows:"Custom Workflows", enterpriseScale:"Enterprise Scale", easeOfUse:"Ease of Use", analytics:"Analytics" };

    // ════════════════════════════════════════════════════════════════════════
    // TAB 2 — COMPETITIVE INTELLIGENCE
    // ════════════════════════════════════════════════════════════════════════
    function CompetitiveTab() {
      const [competitors, setCompetitors] = useState(COMPETITORS_SEED);
      const [selected, setSelected] = useState(null);
      const [editMode, setEditMode] = useState(false);
      const [editData, setEditData] = useState(null);
      const [searchLoading, setSearchLoading] = useState(false);
      const [searchTarget, setSearchTarget] = useState(null);
      const [liveData, setLiveData] = useState({});
      const [msgLoading, setMsgLoading] = useState(false);
